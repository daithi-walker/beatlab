<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multibank — 16-step synth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1318;
    --surface-2: #121920;
    --divider:   #1a2830;
    --text:      #d4e8e0;
    --muted:     #6a8f80;
    --faint:     #2e4a40;
    --teal:      #00e5cc;
    --green:     #39ff6a;
    --amber:     #f5a623;
    --purple:    #b06fff;
    --pink:      #ff6b9d;
    --topbar-h:  52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100%; }

  /* ── TOP BAR ──────────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    display: flex; align-items: center; gap: 12px; padding: 0 20px;
    background: rgba(8,12,16,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--divider); z-index: 10;
  }
  .logo { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal); flex-shrink: 0; }

  .topbar-btn {
    font-family: inherit; font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--teal); background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.35); border-radius: 999px;
    padding: 6px 14px; cursor: pointer; flex-shrink: 0;
    transition: background 120ms, border-color 120ms;
  }
  .topbar-btn:hover   { background: rgba(0,229,204,0.16); }
  .topbar-btn.playing { background: rgba(0,229,204,0.18); border-color: var(--teal); }

  .divider-v { width: 1px; height: 24px; background: var(--divider); flex-shrink: 0; }

  #bank-type-select {
    font-family: inherit; font-size: 0.65rem; letter-spacing: 0.06em;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--divider); border-radius: 6px;
    padding: 5px 8px; cursor: pointer; outline: none;
  }
  #bank-type-select:focus { border-color: var(--teal); }

  .bpm-group { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctrl-label { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .ctrl-value {
    font-size: 0.7rem; color: var(--teal); width: 3.6ch; text-align: center;
    font-variant-numeric: tabular-nums; background: none; border: none;
    border-bottom: 1px solid var(--divider); padding: 0; font-family: inherit;
    -moz-appearance: textfield;
  }
  .ctrl-value:focus { outline: none; border-bottom-color: var(--teal); }
  .ctrl-value::-webkit-inner-spin-button,
  .ctrl-value::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── SLIDERS ──────────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 3px; background: var(--divider); border-radius: 999px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent, var(--teal)); box-shadow: 0 0 6px var(--accent, var(--teal));
    cursor: pointer; transition: transform 100ms;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: var(--accent, var(--teal)); box-shadow: 0 0 6px var(--accent, var(--teal));
  }
  #bpm-slider { width: 90px; }

  /* ── MAIN ─────────────────────────────────────────────────── */
  #main { padding: calc(var(--topbar-h) + 16px) 20px 80px; display: flex; flex-direction: column; gap: 8px; }

  #empty-hint {
    display: flex; align-items: center; justify-content: center;
    height: 160px; color: var(--faint);
    font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* ── PANEL ROW (panel + collapsible fx strip) ─────────────── */
  .panel-row { display: flex; flex-direction: column; animation: panel-in 180ms cubic-bezier(0.16,1,0.3,1); }
  @keyframes panel-in { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

  .panel {
    background: var(--surface); border: 1px solid var(--divider); border-radius: 8px;
    padding: 10px 14px;
    display: grid; grid-template-columns: 80px 1fr;
    align-items: center; gap: 14px;
    transition: border-color 200ms, border-radius 120ms;
  }
  .panel:hover { border-color: color-mix(in srgb, var(--accent) 30%, transparent); }

  .panel[data-color="0"] { --accent: var(--teal);   }
  .panel[data-color="1"] { --accent: var(--green);  }
  .panel[data-color="2"] { --accent: var(--amber);  }
  .panel[data-color="3"] { --accent: var(--purple); }
  .panel[data-color="4"] { --accent: var(--pink);   }

  /* Panel meta (left column) */
  .panel-meta { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .meta-header { display: flex; align-items: center; gap: 4px; }
  .panel-name { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-type { font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }

  .delete-btn {
    background: none; border: none; color: var(--faint); cursor: pointer;
    font-size: 0.75rem; line-height: 1; padding: 2px; flex-shrink: 0;
    transition: color 120ms;
  }
  .delete-btn:hover { color: var(--text); }

  .mute-btn {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--muted); display: flex; align-items: center; justify-content: center;
    transition: color 120ms, opacity 120ms;
    flex-shrink: 0;
  }
  .mute-btn:hover { color: var(--accent); }
  .mute-btn.muted { color: var(--accent); opacity: 0.45; }

  .note-select {
    font-family: inherit; font-size: 0.6rem; letter-spacing: 0.04em;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--divider); border-radius: 4px;
    padding: 3px 5px; cursor: pointer; outline: none; width: 100%;
  }
  .note-select:focus { border-color: var(--accent); }

  /* ── STEP GRID ────────────────────────────────────────────── */
  .steps {
    display: grid;
    /* 4 groups of 4 with a thin gap between groups */
    grid-template-columns: repeat(4,1fr) 6px repeat(4,1fr) 6px repeat(4,1fr) 6px repeat(4,1fr);
    gap: 4px; align-items: center;
    touch-action: none; /* tell browser not to scroll — we own this touch */
  }
  .step-divider { width: 1px; height: 22px; background: var(--divider); justify-self: center; }

  .step {
    aspect-ratio: 1; min-width: 0; border-radius: 4px;
    border: 1px solid #2a3c48; background: #1c2830;
    cursor: pointer; transition: background 80ms, border-color 80ms, box-shadow 80ms;
  }
  .step:hover { border-color: color-mix(in srgb, var(--accent) 60%, transparent); }
  .step.on {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
  }
  .step.current { border-color: var(--accent); box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 65%, transparent); }
  .step.on.current { background: #fff; border-color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.55); }
  @media (pointer: coarse) {
    .step { background: #222e3a; border-color: #374f60; border-radius: 6px; }
  }

  /* ── FX TOGGLE BUTTON (inside panel meta) ─────────────────── */
  .fx-toggle {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--muted); display: flex; align-items: center; justify-content: center;
    transition: color 120ms;
    flex-shrink: 0;
  }
  .fx-toggle:hover  { color: var(--accent); }
  .fx-toggle.active { color: var(--accent); }

  /* ── FX PANEL (floating side-panel on desktop, bottom sheet on mobile) ── */
  #fx-panel {
    position: fixed; z-index: 200;
    background: var(--surface);
    border: 1px solid var(--divider);
    display: none;
  }
  #fx-panel.open { display: flex; flex-direction: column; }

  /* Desktop: right side panel */
  @media (min-width: 600px) {
    #fx-panel {
      top: var(--topbar-h); right: 0; bottom: 0;
      width: 260px;
      border-top: none; border-right: none; border-radius: 0;
      border-left: 1px solid var(--divider);
      box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    }
  }
  /* Mobile: bottom sheet */
  @media (max-width: 599px) {
    #fx-panel {
      left: 0; right: 0; bottom: 0;
      border-radius: 16px 16px 0 0;
      border-bottom: none;
      max-height: 60vh;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
    }
  }

  #fx-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }
  #fx-panel-title {
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #fx-panel-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 4px;
    transition: color 120ms;
  }
  #fx-panel-close:hover { color: var(--text); }

  #fx-panel-body {
    overflow-y: auto; flex: 1; padding: 12px 16px 24px;
    display: flex; flex-direction: column; gap: 0;
  }

  /* Each FX row: label | slider | value  (horizontal layout, stacked vertically) */
  .fx-row {
    display: grid;
    grid-template-columns: 68px 1fr 42px;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--divider);
  }
  .fx-row:last-child { border-bottom: none; }
  .fx-row-label {
    font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); white-space: nowrap;
  }
  .fx-row-val {
    font-size: 0.62rem; color: var(--accent);
    font-variant-numeric: tabular-nums; text-align: right;
  }
  .fx-sep-row {
    height: 1px; background: var(--divider); margin: 4px 0;
  }
  #fx-panel-body input[type="range"] { width: 100%; }

  /* ── PATTERNS POPOVER ────────────────────────────────────── */
  #patterns-popover {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    min-width: 200px; background: var(--surface); border: 1px solid var(--divider);
    border-radius: 8px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  #patterns-popover.open { display: flex; flex-direction: column; }
  #patterns-list { max-height: 220px; overflow-y: auto; }
  .pattern-row {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; cursor: pointer; transition: background 100ms;
  }
  .pattern-row:hover { background: rgba(0,229,204,0.08); }
  .pattern-row-name { flex: 1; font-size: 0.72rem; letter-spacing: 0.04em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pattern-row-del {
    background: none; border: none; color: var(--faint); cursor: pointer;
    font-size: 0.72rem; padding: 2px 4px; transition: color 120ms; flex-shrink: 0;
  }
  .pattern-row-del:hover { color: var(--pink); }
  #patterns-list-empty { padding: 12px 10px; font-size: 0.68rem; color: var(--muted); }
  #patterns-save-row {
    display: flex; gap: 6px; padding: 8px 10px;
    border-top: 1px solid var(--divider);
  }
  #patterns-name-input {
    flex: 1; background: var(--surface-2); border: 1px solid var(--divider);
    border-radius: 4px; color: var(--text); font-size: 0.72rem; padding: 4px 8px;
    font-family: inherit; outline: none;
  }
  #patterns-name-input:focus { border-color: var(--teal); }
  #patterns-save-btn {
    background: rgba(0,229,204,0.12); border: 1px solid rgba(0,229,204,0.3);
    border-radius: 4px; color: var(--teal); cursor: pointer; font-size: 0.68rem;
    letter-spacing: 0.06em; padding: 4px 10px; font-family: inherit; transition: background 120ms;
  }
  #patterns-save-btn:hover { background: rgba(0,229,204,0.22); }

  /* ── FULLSCREEN BTN ──────────────────────────────────────── */
  .topbar-icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 6px; display: flex; align-items: center;
    transition: color 120ms; flex-shrink: 0;
  }
  .topbar-icon-btn:hover { color: var(--teal); }

  /* ── BEAT DOTS ────────────────────────────────────────────── */
  #beat-row {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; align-items: center; pointer-events: none;
  }
  .beat-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--divider); transition: background 60ms, box-shadow 60ms; }
  .beat-dot.quarter { width: 7px; height: 7px; }
  .beat-dot.active  { background: var(--teal); box-shadow: 0 0 6px var(--teal); }

  /* ── AUDIO BANNER ─────────────────────────────────────────── */
  #audio-banner {
    position: fixed; top: calc(var(--topbar-h) + 12px); left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--teal); background: rgba(14,19,24,0.9);
    border: 1px solid rgba(0,229,204,0.2); border-radius: 999px;
    padding: 8px 18px; backdrop-filter: blur(12px); z-index: 20; transition: opacity 300ms;
  }
  #audio-banner.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<header id="topbar">
  <a href="../index.html" class="topbar-btn" style="text-decoration:none;font-size:11px;letter-spacing:.08em;">⌂ BeatLab</a>
  <div class="divider-v"></div>
  <div class="logo">Multibank</div>
  <button class="topbar-btn" id="play-btn">▶ Play</button>

  <div class="divider-v"></div>

  <button class="topbar-btn" id="add-bank-btn">＋ Add Bank</button>

  <div class="divider-v"></div>

  <button class="topbar-btn" id="steps-btn" title="Toggle 16/32 steps">16 steps</button>

  <div class="divider-v"></div>

  <button class="topbar-btn" id="mute-all-btn">Mute All</button>

  <div class="divider-v"></div>

  <div class="patterns-group" style="position:relative;">
    <button class="topbar-btn" id="patterns-btn">Patterns ▾</button>
    <div id="patterns-popover">
      <div id="patterns-list"></div>
      <div id="patterns-save-row">
        <input id="patterns-name-input" type="text" placeholder="pattern name" spellcheck="false">
        <button id="patterns-save-btn">Save</button>
      </div>
    </div>
  </div>

  <div class="bpm-group">
    <span class="ctrl-label">BPM</span>
    <input type="range" id="bpm-slider" min="60" max="200" value="120">
    <input type="number" class="ctrl-value" id="bpm-value" min="60" max="200" value="120">
  </div>

  <button class="topbar-icon-btn" id="fullscreen-btn" title="Fullscreen" aria-label="Toggle fullscreen">
    <svg id="fs-icon-expand" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <svg id="fs-icon-collapse" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
      <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
      <line x1="10" y1="14" x2="3" y2="21"/><line x1="14" y1="10" x2="21" y2="3"/>
    </svg>
  </button>
</header>

<!-- FX side panel / bottom sheet -->
<div id="fx-panel">
  <div id="fx-panel-header">
    <span id="fx-panel-title">FX</span>
    <button id="fx-panel-close" aria-label="Close FX panel">✕</button>
  </div>
  <div id="fx-panel-body"></div>
</div>

<div id="main"></div>

<div id="beat-row" aria-hidden="true"></div>
<div id="audio-banner">tap anywhere to enable audio</div>

<script type="module">
import { noteStringToFreq as noteToFreq, makeImpulse, makePinkNoise, makeWhiteNoise, distCurve as makeDistortionCurve } from '../core/audio.js';
import { savePattern, loadPattern, listPatterns, deletePattern } from '../core/storage.js';

(() => {
  'use strict';

  /* ════════════════════════════════════════════════════════════
     CONSTANTS
  ════════════════════════════════════════════════════════════ */
  let STEPS       = 16;
  const LOOKAHEAD = 0.1;   // schedule this many seconds ahead
  const TICK_MS   = 25;    // scheduler poll interval

  const ACCENT_COLORS = 5; // cycles 0–4

  const NOTES = [
    'C2','D2','E2','F2','G2','A2','B2',
    'C3','D3','E3','F3','G3','A3','B3',
    'C4','D4','E4','F4','G4','A4','B4',
  ];

  /* ════════════════════════════════════════════════════════════
     BANK TYPE DEFINITIONS
     Each entry defines default audio settings for that voice.
     Actual panel instances are created dynamically by addPanel().
  ════════════════════════════════════════════════════════════ */
  const BANK_TYPES = {
    // Drums                                                    dist  delay chorus lfoRate
    kick:    { name:'Kick',     type:'drum',   volume:0.9,  filter:900,   reverb:0.06, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    snare:   { name:'Snare',    type:'drum',   volume:0.75, filter:5000,  reverb:0.18, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    hihat:   { name:'Hi-Hat',   type:'drum',   volume:0.75, filter:12000, reverb:0.05, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    clap:    { name:'Clap',     type:'drum',   volume:0.7,  filter:5000,  reverb:0.22, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    tomhi:   { name:'Tom Hi',   type:'drum',   volume:0.8,  filter:2000,  reverb:0.1,  distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    tomlo:   { name:'Tom Lo',   type:'drum',   volume:0.85, filter:1000,  reverb:0.08, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    openhat: { name:'Open Hat', type:'drum',   volume:0.65, filter:12000, reverb:0.12, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    crash:   { name:'Crash',    type:'drum',   volume:0.60, filter:8000,  reverb:0.45, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    // Melodic
    bass:    { name:'Bass',     type:'melody', volume:0.8,  filter:700,   reverb:0.12, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D2' },
    sub:     { name:'Sub',      type:'melody', volume:0.9,  filter:400,   reverb:0.05, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D2' },
    lead:    { name:'Lead',     type:'melody', volume:0.55, filter:3000,  reverb:0.3,  distortion:0,    delay:0.3,  chorus:0,    lfoRate:0,   note:'A3' },
    pluck:   { name:'Pluck',    type:'melody', volume:0.7,  filter:4000,  reverb:0.15, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D3' },
    pad:     { name:'Pad',      type:'melody', volume:0.5,  filter:2000,  reverb:0.5,  distortion:0,    delay:0,    chorus:0.4,  lfoRate:0.4, note:'A3' },
  };

  /* ════════════════════════════════════════════════════════════
     TRANSPORT STATE
  ════════════════════════════════════════════════════════════ */
  let playing      = false;
  let currentStep  = 0;
  let nextBeatTime = 0;
  let bpm          = 120;
  let tickTimer    = null;

  function stepDuration() { return 60 / bpm / 4; }

  /* ════════════════════════════════════════════════════════════
     ACTIVE PANELS  (starts empty, grows as user adds banks)
  ════════════════════════════════════════════════════════════ */
  let panels = [];           // array of panel objects
  let instanceCounter = 0;  // unique ID for each panel instance
  const nodes = {};         // instanceId → { filter, gain, reverbSend }

  /* ════════════════════════════════════════════════════════════
     AUDIO ENGINE
  ════════════════════════════════════════════════════════════ */
  let ctx, masterGain, compressor, reverbConvolver, reverbReturn;
  let sharedDelay, sharedDelayFeedback, sharedChorusDelay, sharedChorusLfo, sharedChorusLfoGain;
  let pinkBuf, whiteBuf;

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.gain.value = 0.85;

    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.ratio.value = 4;

    masterGain.connect(compressor);
    compressor.connect(ctx.destination);

    // Shared reverb — all panel reverbSend nodes feed this
    reverbConvolver = ctx.createConvolver();
    reverbConvolver.buffer = makeImpulse(ctx, 2.5, 2.8);
    reverbReturn = ctx.createGain();
    reverbReturn.gain.value = 0.9;
    reverbConvolver.connect(reverbReturn);
    reverbReturn.connect(masterGain);

    // Shared delay bus — one feedback loop serves all panels
    sharedDelay = ctx.createDelay(2.0);
    sharedDelay.delayTime.value = 60 / bpm / 2;
    sharedDelayFeedback = ctx.createGain();
    sharedDelayFeedback.gain.value = 0.4;
    sharedDelay.connect(sharedDelayFeedback);
    sharedDelayFeedback.connect(sharedDelay);
    sharedDelay.connect(masterGain);

    // Shared chorus bus — one LFO modulates all panels
    sharedChorusDelay = ctx.createDelay(0.05);
    sharedChorusDelay.delayTime.value = 0.02;
    sharedChorusLfo = ctx.createOscillator();
    sharedChorusLfo.type = 'sine';
    sharedChorusLfo.frequency.value = 1.2;
    sharedChorusLfoGain = ctx.createGain();
    sharedChorusLfoGain.gain.value = 0.008;
    sharedChorusLfo.connect(sharedChorusLfoGain);
    sharedChorusLfoGain.connect(sharedChorusDelay.delayTime);
    sharedChorusLfo.start();
    sharedChorusDelay.connect(masterGain);

    // Noise buffers — pre-generated once, shared across all drum hits
    pinkBuf  = makePinkNoise(ctx, 2);
    whiteBuf = makeWhiteNoise(ctx, 2);  // 2s so crash has enough tail
  }

  function buildPanelNodes(panel) {
    /*
       Full signal chain per panel:

         voice
           → distortion (WaveShaper, bypass when curve=null)
           → filter     (BiquadFilter lowpass)  ← filterLfo modulates frequency
           → gain       (volume)
           → masterGain                           dry path
           → reverbSend → reverbConvolver         reverb send
           → delaySend  → sharedDelay (shared bus)
           → chorusSend → sharedChorusDelay (shared bus)
    */

    // Entry point: distortion (pass-through when curve=null)
    const distortion = ctx.createWaveShaper();
    distortion.curve = makeDistortionCurve(panel.distortion);
    distortion.oversample = '2x';

    // Filter
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = panel.filter;
    filter.Q.value = 1;

    // FilterLFO — only create oscillator when actually used (saves CPU)
    let filterLfo = null, filterLfoGain = null;
    if (panel.lfoRate > 0) {
      filterLfo = ctx.createOscillator();
      filterLfo.type = 'sine';
      filterLfo.frequency.value = panel.lfoRate;
      filterLfoGain = ctx.createGain();
      filterLfoGain.gain.value = panel.filter * 0.5;
      filterLfo.connect(filterLfoGain);
      filterLfoGain.connect(filter.frequency);
      filterLfo.start();
    }

    // Volume
    const gain = ctx.createGain();
    gain.gain.value = panel.volume;

    // Reverb send → shared convolver
    const reverbSend = ctx.createGain();
    reverbSend.gain.value = panel.reverb;
    reverbSend.connect(reverbConvolver);

    // Delay send → shared delay bus
    const delaySend = ctx.createGain();
    delaySend.gain.value = panel.delay;
    delaySend.connect(sharedDelay);

    // Chorus send → shared chorus bus
    const chorusSend = ctx.createGain();
    chorusSend.gain.value = panel.chorus;
    chorusSend.connect(sharedChorusDelay);

    // Wire the main chain
    distortion.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    gain.connect(reverbSend);
    gain.connect(delaySend);
    gain.connect(chorusSend);

    nodes[panel.instanceId] = {
      entry: distortion,
      distortion, filter, filterLfo, filterLfoGain,
      gain, reverbSend, delaySend, chorusSend,
    };
  }

  function teardownPanelNodes(instanceId) {
    const n = nodes[instanceId];
    if (!n) return;
    try { if (n.filterLfo) n.filterLfo.stop(); } catch (_) {}
    try {
      [n.distortion, n.filter, n.filterLfoGain, n.gain,
       n.reverbSend, n.delaySend, n.chorusSend].filter(Boolean).forEach(node => node.disconnect());
    } catch (_) {}
    delete nodes[instanceId];
  }

  /* ════════════════════════════════════════════════════════════
     SYNTH VOICES
     Each takes (time, dest, panel?) and creates short-lived nodes
     that auto-GC after osc.stop() / source.stop().
  ════════════════════════════════════════════════════════════ */

  function playKick(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    g.gain.setValueAtTime(1.8, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.5);
  }

  function playSnare(time, dest) {
    // Body: tonal crack
    const body = ctx.createOscillator(), bg = ctx.createGain();
    body.type = 'triangle';
    body.frequency.setValueAtTime(220, time);
    body.frequency.exponentialRampToValueAtTime(100, time + 0.06);
    bg.gain.setValueAtTime(1.0, time);
    bg.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    body.connect(bg); bg.connect(dest);
    body.start(time); body.stop(time + 0.15);
    // Noise: snare rattle
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), ng = ctx.createGain();
    ns.buffer = pinkBuf;
    hp.type = 'highpass'; hp.frequency.value = 2000;
    ng.gain.setValueAtTime(1.2, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    ns.connect(hp); hp.connect(ng); ng.connect(dest);
    ns.start(time); ns.stop(time + 0.2);
  }

  function playHihat(time, dest) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf;
    hp.type = 'highpass'; hp.frequency.value = 7000;
    g.gain.setValueAtTime(1.4, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    ns.connect(hp); hp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 0.08);
  }

  function playClap(time, dest) {
    // Three fast noise bursts in quick succession — the flamming gives it body
    [0, 0.008, 0.018].forEach(offset => {
      const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
      ns.buffer = pinkBuf;
      hp.type = 'highpass'; hp.frequency.value = 1600;
      g.gain.setValueAtTime(0.9, time + offset);
      g.gain.exponentialRampToValueAtTime(0.001, time + offset + 0.07);
      ns.connect(hp); hp.connect(g); g.connect(dest);
      ns.start(time + offset); ns.stop(time + offset + 0.09);
    });
  }

  function playTomHi(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(80, time + 0.15);
    g.gain.setValueAtTime(1.3, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.35);
  }

  function playTomLo(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(100, time);
    osc.frequency.exponentialRampToValueAtTime(45, time + 0.2);
    g.gain.setValueAtTime(1.5, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.5);
  }

  function playOpenHat(time, dest) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf;
    hp.type = 'highpass'; hp.frequency.value = 7000;
    g.gain.setValueAtTime(1.2, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    ns.connect(hp); hp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 0.38);
  }

  function playCrash(time, dest) {
    const ns = ctx.createBufferSource();
    ns.buffer = whiteBuf;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 3000;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 8000; bp.Q.value = 0.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(1.0, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 1.4);
    ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 1.5);
  }

  function playBass(time, dest, freq) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.9, time + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.28);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.32);
  }

  function playSub(time, dest, freq) {
    // Plays an octave below the selected note — pure sine for maximum sub weight
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq / 2;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(1.0, time + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.55);
  }

  function playLead(time, dest, freq) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.7, time + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.26);
  }

  function playPluck(time, dest, freq) {
    // Very fast decay — the brevity is what makes it sound "plucked"
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.9, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.1);
  }

  function playPad(time, dest, freq) {
    // Two slightly detuned oscillators with slow attack → wide, ambient wash
    [-6, 6].forEach(detune => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq; osc.detune.value = detune;
      g.gain.setValueAtTime(0.001, time);
      g.gain.linearRampToValueAtTime(0.35, time + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
      osc.connect(g); g.connect(dest);
      osc.start(time); osc.stop(time + 0.88);
    });
  }

  /* Voice dispatch — maps typeKey to the right function */
  const VOICES = {
    kick:    (t, d)    => playKick(t, d),
    snare:   (t, d)    => playSnare(t, d),
    hihat:   (t, d)    => playHihat(t, d),
    clap:    (t, d)    => playClap(t, d),
    tomhi:   (t, d)    => playTomHi(t, d),
    tomlo:   (t, d)    => playTomLo(t, d),
    openhat: (t, d)    => playOpenHat(t, d),
    crash:   (t, d)    => playCrash(t, d),
    bass:    (t, d, p) => playBass(t, d, noteToFreq(p.note)),
    sub:     (t, d, p) => playSub(t, d, noteToFreq(p.note)),
    lead:    (t, d, p) => playLead(t, d, noteToFreq(p.note)),
    pluck:   (t, d, p) => playPluck(t, d, noteToFreq(p.note)),
    pad:     (t, d, p) => playPad(t, d, noteToFreq(p.note)),
  };

  /* ════════════════════════════════════════════════════════════
     PANEL MANAGEMENT
  ════════════════════════════════════════════════════════════ */

  function addPanel(typeKey) {
    if (!ctx) initAudio();
    ctx.resume();

    const template = BANK_TYPES[typeKey];
    if (!template) return;

    const id = instanceCounter++;
    const panel = {
      instanceId: id,
      typeKey,
      name:   template.name,
      type:   template.type,
      color:  id % ACCENT_COLORS,
      steps:  Array(STEPS).fill(false),
      muted:  false,
      volume:     template.volume,
      filter:     template.filter,
      reverb:     template.reverb,
      distortion: template.distortion,
      delay:      template.delay,
      chorus:     template.chorus,
      lfoRate:    template.lfoRate,
      note:       template.note || 'A3',
    };

    panels.push(panel);
    buildPanelNodes(panel);
    renderPanel(panel);

    document.getElementById('empty-hint')?.remove();
  }

  function removePanel(instanceId) {
    const idx = panels.findIndex(p => p.instanceId === instanceId);
    if (idx < 0) return;
    panels.splice(idx, 1);
    teardownPanelNodes(instanceId);
    // Close FX panel if it was showing this bank
    if (fxActivePanel?.instanceId === instanceId) {
      document.getElementById('fx-panel').classList.remove('open');
      fxActivePanel = null; fxActiveToggle = null;
    }
    document.querySelector(`.panel-row[data-instance-id="${instanceId}"]`)?.remove();
    if (panels.length === 0) {
      const hint = document.createElement('div');
      hint.id = 'empty-hint';
      hint.textContent = '← add a bank to get started';
      document.getElementById('main').appendChild(hint);
    }
  }

  /* ════════════════════════════════════════════════════════════
     SCHEDULER
     Queues audio events to the audio clock (not setTimeout) so
     timing stays solid regardless of tab focus or JS jank.
  ════════════════════════════════════════════════════════════ */

  function scheduleStep(step, time) {
    panels.forEach(panel => {
      if (!panel.steps[step] || panel.muted) return;
      const dest = nodes[panel.instanceId].entry;
      VOICES[panel.typeKey](time, dest, panel);
    });

    const msUntil = Math.max(0, (time - ctx.currentTime) * 1000);
    setTimeout(() => updatePlayhead(step), msUntil);
  }

  function tick() {
    while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
      scheduleStep(currentStep, nextBeatTime);
      nextBeatTime += stepDuration();
      currentStep = (currentStep + 1) % STEPS;
    }
  }

  /* ════════════════════════════════════════════════════════════
     TRANSPORT
  ════════════════════════════════════════════════════════════ */

  function startTransport() {
    if (!ctx) initAudio();
    ctx.resume();
    playing      = true;
    currentStep  = 0;
    nextBeatTime = ctx.currentTime + 0.05;
    tickTimer    = setInterval(tick, TICK_MS);
    document.getElementById('play-btn').textContent = '◼ Stop';
    document.getElementById('play-btn').classList.add('playing');
  }

  function stopTransport() {
    playing = false;
    clearInterval(tickTimer);
    clearPlayhead();
    document.getElementById('play-btn').textContent = '▶ Play';
    document.getElementById('play-btn').classList.remove('playing');
  }

  function toggleTransport() {
    if (playing) stopTransport(); else startTransport();
  }

  /* ════════════════════════════════════════════════════════════
     UI — PANEL RENDERING
  ════════════════════════════════════════════════════════════ */

  // FX panel state
  let fxActivePanel = null;
  let fxActiveToggle = null;

  function renderPanel(panel) {
    const row = document.createElement('div');
    row.className = 'panel-row';
    row.dataset.instanceId = panel.instanceId;

    const el = document.createElement('div');
    el.className = 'panel';
    el.dataset.instanceId = panel.instanceId;
    el.dataset.color      = panel.color;

    /* Left: meta */
    const meta = document.createElement('div');
    meta.className = 'panel-meta';

    const header = document.createElement('div');
    header.className = 'meta-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'panel-name';
    nameEl.textContent = panel.name;

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '✕';
    deleteBtn.title = 'Remove bank';
    deleteBtn.addEventListener('click', () => removePanel(panel.instanceId));

    const muteBtn = document.createElement('button');
    muteBtn.className = 'mute-btn';
    muteBtn.title = 'Mute / unmute';
    muteBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path class="mute-x" d="M23 9 17 15M17 9 23 15" style="display:none"/>
      <path class="vol-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>`;
    muteBtn.addEventListener('click', () => {
      panel.muted = !panel.muted;
      muteBtn.classList.toggle('muted', panel.muted);
      muteBtn.querySelector('.mute-x').style.display   = panel.muted ? '' : 'none';
      muteBtn.querySelector('.vol-waves').style.display = panel.muted ? 'none' : '';
    });

    const fxToggle = document.createElement('button');
    fxToggle.className = 'fx-toggle';
    fxToggle.title = 'Open FX';
    fxToggle.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
      <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
      <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
    </svg>`;
    fxToggle.addEventListener('click', () => { openFxPanel(panel, fxToggle); });

    header.appendChild(nameEl);
    header.appendChild(muteBtn);
    header.appendChild(fxToggle);
    header.appendChild(deleteBtn);
    meta.appendChild(header);

    // Type selector — lets the user change the bank type after adding it
    const typeSelect = document.createElement('select');
    typeSelect.className = 'note-select'; // reuse same compact select style
    const DRUM_TYPES    = ['kick','snare','hihat','clap','tomhi','tomlo','openhat','crash'];
    const MELODY_TYPES  = ['bass','sub','lead','pluck','pad'];
    const drumGroup     = document.createElement('optgroup');
    drumGroup.label     = 'Drums';
    DRUM_TYPES.forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = BANK_TYPES[k].name;
      if (k === panel.typeKey) o.selected = true;
      drumGroup.appendChild(o);
    });
    const melodyGroup   = document.createElement('optgroup');
    melodyGroup.label   = 'Melodic';
    MELODY_TYPES.forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = BANK_TYPES[k].name;
      if (k === panel.typeKey) o.selected = true;
      melodyGroup.appendChild(o);
    });
    typeSelect.appendChild(drumGroup);
    typeSelect.appendChild(melodyGroup);

    typeSelect.addEventListener('change', e => {
      const newKey      = e.target.value;
      const template    = BANK_TYPES[newKey];
      panel.typeKey     = newKey;
      panel.name        = template.name;
      panel.type        = template.type;
      nameEl.textContent = template.name;
      // Show or hide the note picker depending on whether the new type is melodic
      noteWrap.style.display = template.type === 'melody' ? '' : 'none';
    });
    meta.appendChild(typeSelect);

    // Note picker — always in the DOM, shown only for melodic types
    const noteWrap = document.createElement('div');
    noteWrap.style.display = panel.type === 'melody' ? '' : 'none';
    const noteSel = document.createElement('select');
    noteSel.className = 'note-select';
    NOTES.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      if (n === panel.note) opt.selected = true;
      noteSel.appendChild(opt);
    });
    noteSel.addEventListener('change', e => { panel.note = e.target.value; });
    noteWrap.appendChild(noteSel);
    meta.appendChild(noteWrap);

    el.appendChild(meta);
    el.appendChild(buildStepGrid(panel));

    row.appendChild(el);
    document.getElementById('main').appendChild(row);
  }

  function buildStepGrid(panel) {
    const grid = document.createElement('div');
    grid.className = 'steps';

    for (let s = 0; s < STEPS; s++) {
      if (s > 0 && s % 4 === 0) {
        const div = document.createElement('div');
        div.className = 'step-divider';
        grid.appendChild(div);
      }
      const btn = document.createElement('button');
      btn.className = 'step';
      btn.dataset.instanceId = panel.instanceId;
      btn.dataset.step       = s;
      grid.appendChild(btn);
    }

    // Listeners on the grid, not individual buttons — keeps drag working
    // across step boundaries without setPointerCapture (which swallows
    // elementFromPoint results on iOS when the pointer moves off the target).
    let dragIntent = null;

    grid.addEventListener('pointerdown', e => {
      const btn = e.target.closest('.step');
      if (!btn || btn.dataset.instanceId !== String(panel.instanceId)) return;
      e.preventDefault();
      dragIntent = panel.steps[parseInt(btn.dataset.step, 10)] ? 'off' : 'on';
      applyIntent(panel, btn, parseInt(btn.dataset.step, 10), dragIntent);
    });

    grid.addEventListener('pointermove', e => {
      if (dragIntent === null) return;
      e.preventDefault();
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.step');
      if (!target || target.dataset.instanceId !== String(panel.instanceId)) return;
      applyIntent(panel, target, parseInt(target.dataset.step, 10), dragIntent);
    }, { passive: false });

    grid.addEventListener('pointerup',     () => { dragIntent = null; });
    grid.addEventListener('pointercancel', () => { dragIntent = null; });

    return grid;
  }

  function applyIntent(panel, btn, step, intent) {
    const wantOn = intent === 'on';
    if (panel.steps[step] === wantOn) return;
    panel.steps[step] = wantOn;
    btn.classList.toggle('on', wantOn);
  }

  function openFxPanel(panel, toggleBtn) {
    const fxPanel = document.getElementById('fx-panel');
    const isSamePanel = fxActivePanel === panel;

    // Deactivate previous toggle
    if (fxActiveToggle) fxActiveToggle.classList.remove('active');

    if (isSamePanel && fxPanel.classList.contains('open')) {
      fxPanel.classList.remove('open');
      fxActivePanel = null;
      fxActiveToggle = null;
      return;
    }

    fxActivePanel = panel;
    fxActiveToggle = toggleBtn;
    toggleBtn.classList.add('active');

    // Title uses the accent color of this panel
    const titleEl = document.getElementById('fx-panel-title');
    titleEl.textContent = panel.name + ' — FX';
    titleEl.style.color = `var(--accent)`;
    // Pass accent via the panel element's data-color onto the title
    const accentMap = ['var(--teal)','var(--green)','var(--amber)','var(--purple)','var(--pink)'];
    titleEl.style.color = accentMap[panel.color] || 'var(--teal)';

    // Build body
    const body = document.getElementById('fx-panel-body');
    body.innerHTML = '';
    const nd = () => nodes[panel.instanceId];

    body.appendChild(makeFxRow('Volume', 0, 1, 0.01, panel.volume,
      v => Math.round(v * 100) + '%',
      v => { panel.volume = v; nd()?.gain.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    body.appendChild(makeFxRow('Filter', 80, 12000, 10, panel.filter,
      v => v < 1000 ? Math.round(v) + 'Hz' : (v / 1000).toFixed(1) + 'k',
      v => { panel.filter = v; nd()?.filter.frequency.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    body.appendChild(makeFxRow('LFO Rate', 0, 8, 0.1, panel.lfoRate,
      v => v === 0 ? 'off' : v.toFixed(1) + 'Hz',
      v => {
        panel.lfoRate = v;
        const n = nd();
        if (!n) return;
        if (v > 0) {
          if (!n.filterLfo) {
            n.filterLfo = ctx.createOscillator();
            n.filterLfo.type = 'sine';
            n.filterLfoGain = ctx.createGain();
            n.filterLfo.connect(n.filterLfoGain);
            n.filterLfoGain.connect(n.filter.frequency);
            n.filterLfo.start();
          }
          n.filterLfo.frequency.setTargetAtTime(v, ctx.currentTime, 0.05);
          n.filterLfoGain.gain.setTargetAtTime(panel.filter * 0.5, ctx.currentTime, 0.05);
        } else if (n.filterLfoGain) {
          n.filterLfoGain.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
        }
      }
    ));
    body.appendChild(makeFxRow('Reverb', 0, 1, 0.01, panel.reverb,
      v => Math.round(v * 100) + '%',
      v => { panel.reverb = v; nd()?.reverbSend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    const sep = document.createElement('div');
    sep.className = 'fx-sep-row';
    body.appendChild(sep);
    body.appendChild(makeFxRow('Delay', 0, 1, 0.01, panel.delay,
      v => Math.round(v * 100) + '%',
      v => { panel.delay = v; nd()?.delaySend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    body.appendChild(makeFxRow('Distort', 0, 1, 0.01, panel.distortion,
      v => Math.round(v * 100) + '%',
      v => { panel.distortion = v; if (nd()) nd().distortion.curve = makeDistortionCurve(v); }
    ));
    body.appendChild(makeFxRow('Chorus', 0, 1, 0.01, panel.chorus,
      v => Math.round(v * 100) + '%',
      v => { panel.chorus = v; nd()?.chorusSend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));

    fxPanel.classList.add('open');
  }

  function makeFxRow(label, min, max, step, value, format, onChange) {
    const row = document.createElement('div');
    row.className = 'fx-row';

    const lbl = document.createElement('span');
    lbl.className = 'fx-row-label';
    lbl.textContent = label;

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.step = step; slider.value = value;

    const val = document.createElement('span');
    val.className = 'fx-row-val';
    val.textContent = format(value);

    slider.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      val.textContent = format(v);
      onChange(v);
    });

    row.appendChild(lbl); row.appendChild(slider); row.appendChild(val);
    return row;
  }

  /* ════════════════════════════════════════════════════════════
     PLAYHEAD
  ════════════════════════════════════════════════════════════ */

  let lastHighlight = -1;

  function updatePlayhead(step) {
    if (lastHighlight >= 0) {
      document.querySelectorAll(`.step[data-step="${lastHighlight}"]`).forEach(el => el.classList.remove('current'));
      const prev = document.querySelectorAll('.beat-dot')[lastHighlight];
      if (prev) prev.classList.remove('active');
    }
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    const dot = document.querySelectorAll('.beat-dot')[step];
    if (dot) dot.classList.add('active');
    lastHighlight = step;
  }

  function clearPlayhead() {
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll('.beat-dot.active').forEach(el => el.classList.remove('active'));
    lastHighlight = -1;
  }

  /* ════════════════════════════════════════════════════════════
     STATIC UI & CONTROLS
  ════════════════════════════════════════════════════════════ */

  // Beat dots
  const beatRow = document.getElementById('beat-row');
  function rebuildBeatRow() {
    beatRow.innerHTML = '';
    for (let i = 0; i < STEPS; i++) {
      const dot = document.createElement('div');
      dot.className = 'beat-dot' + (i % 4 === 0 ? ' quarter' : '');
      beatRow.appendChild(dot);
    }
  }
  rebuildBeatRow();

  document.getElementById('play-btn').addEventListener('click', toggleTransport);

  const muteAllBtn = document.getElementById('mute-all-btn');
  let allMuted = false;
  muteAllBtn.addEventListener('click', () => {
    allMuted = !allMuted;
    panels.forEach(panel => {
      panel.muted = allMuted;
      const row = document.querySelector(`.panel-row[data-instance-id="${panel.instanceId}"]`);
      if (!row) return;
      const mb = row.querySelector('.mute-btn');
      if (!mb) return;
      mb.classList.toggle('muted', allMuted);
      mb.querySelector('.mute-x').style.display    = allMuted ? '' : 'none';
      mb.querySelector('.vol-waves').style.display = allMuted ? 'none' : '';
    });
    muteAllBtn.textContent       = allMuted ? 'Unmute All' : 'Mute All';
    muteAllBtn.style.color       = allMuted ? 'var(--pink)' : '';
    muteAllBtn.style.borderColor = allMuted ? 'rgba(255,107,157,0.4)' : '';
    muteAllBtn.style.background  = allMuted ? 'rgba(255,107,157,0.08)' : '';
  });

  document.getElementById('add-bank-btn').addEventListener('click', () => {
    addPanel('kick');
  });

  // FX panel close
  document.getElementById('fx-panel-close').addEventListener('click', () => {
    document.getElementById('fx-panel').classList.remove('open');
    if (fxActiveToggle) fxActiveToggle.classList.remove('active');
    fxActivePanel = null; fxActiveToggle = null;
  });

  // Fullscreen toggle
  const fsBtn = document.getElementById('fullscreen-btn');
  function syncFsIcon() {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('fs-icon-expand').style.display   = inFs ? 'none' : '';
    document.getElementById('fs-icon-collapse').style.display = inFs ? '' : 'none';
  }
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen)
        .call(document.documentElement);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  });
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);

  // Start with one kick bank so there's something to play immediately
  addPanel('kick');

  const bpmSlider = document.getElementById('bpm-slider');
  const bpmInput  = document.getElementById('bpm-value');

  function setBpm(v) {
    v = Math.max(60, Math.min(200, v));
    if (!isFinite(v)) return;
    bpm = v;
    bpmSlider.value = v;
    bpmInput.value  = v;
    if (sharedDelay) sharedDelay.delayTime.setTargetAtTime(60 / bpm / 2, ctx.currentTime, 0.1);
  }

  bpmSlider.addEventListener('input', e => setBpm(parseInt(e.target.value, 10)));
  bpmInput.addEventListener('change', e => setBpm(parseInt(e.target.value, 10)));
  bpmInput.addEventListener('keydown', e => { if (e.key === 'Enter') bpmInput.blur(); });

  // Steps toggle: 16 ↔ 32
  const stepsBtn = document.getElementById('steps-btn');
  stepsBtn.addEventListener('click', () => {
    const wasPlaying = playing;
    if (wasPlaying) stopTransport();
    STEPS = STEPS === 16 ? 32 : 16;
    stepsBtn.textContent = STEPS + ' steps';
    currentStep = 0;
    // Resize each panel's step array and rebuild its grid
    panels.forEach(panel => {
      if (STEPS > panel.steps.length) {
        while (panel.steps.length < STEPS) panel.steps.push(false);
      } else {
        panel.steps.length = STEPS;
      }
      const row = document.querySelector(`.panel-row[data-instance-id="${panel.instanceId}"]`);
      if (row) {
        const oldGrid = row.querySelector('.steps');
        if (oldGrid) oldGrid.replaceWith(buildStepGrid(panel));
      }
    });
    rebuildBeatRow();
    if (wasPlaying) startTransport();
  });

  /* ══════════════════════════════════════════════════════════
     PATTERNS — save / load / delete
  ══════════════════════════════════════════════════════════ */
  const APP_ID = 'multibank';

  function captureState() {
    return {
      bpm,
      steps: STEPS,
      panels: panels.map(p => ({
        typeKey:     p.typeKey,
        steps:       [...p.steps],
        muted:       p.muted,
        volume:      p.volume,
        filter:      p.filter,
        reverb:      p.reverb,
        distortion:  p.distortion,
        delay:       p.delay,
        chorus:      p.chorus,
        lfoRate:     p.lfoRate,
        note:        p.note,
      })),
    };
  }

  function applyState(saved) {
    if (playing) stopTransport();
    // Clear all panels
    [...panels].forEach(p => removePanel(p.instanceId));
    // Restore step count
    if (saved.steps && saved.steps !== STEPS) {
      STEPS = saved.steps;
      stepsBtn.textContent = STEPS + ' steps';
      rebuildBeatRow();
    }
    // Restore BPM
    if (saved.bpm) setBpm(saved.bpm);
    // Restore panels
    saved.panels.forEach(pd => {
      addPanel(pd.typeKey);
      const panel = panels[panels.length - 1];
      panel.steps       = pd.steps.slice(0, STEPS);
      while (panel.steps.length < STEPS) panel.steps.push(false);
      panel.muted       = pd.muted;
      panel.volume      = pd.volume;
      panel.filter      = pd.filter;
      panel.reverb      = pd.reverb;
      panel.distortion  = pd.distortion;
      panel.delay       = pd.delay;
      panel.chorus      = pd.chorus;
      panel.lfoRate     = pd.lfoRate;
      panel.note        = pd.note || panel.note;
      // Sync audio nodes
      const n = nodes[panel.instanceId];
      if (n) {
        n.gain.gain.value      = panel.volume;
        n.filter.frequency.value = panel.filter;
        n.reverbSend.gain.value  = panel.reverb;
        n.delaySend.gain.value   = panel.delay;
        n.chorusSend.gain.value  = panel.chorus;
        if (n.distortion) n.distortion.curve = makeDistortionCurve(panel.distortion);
      }
      // Sync step buttons
      const grid = document.querySelector(`.panel-row[data-instance-id="${panel.instanceId}"] .steps`);
      if (grid) {
        grid.querySelectorAll('.step').forEach(btn => {
          const s = parseInt(btn.dataset.step, 10);
          btn.classList.toggle('on', !!panel.steps[s]);
        });
      }
      // Sync mute button
      const muteBtn = document.querySelector(`.panel-row[data-instance-id="${panel.instanceId}"] .mute-btn`);
      if (muteBtn) {
        muteBtn.classList.toggle('muted', panel.muted);
        muteBtn.querySelector('.mute-x').style.display    = panel.muted ? '' : 'none';
        muteBtn.querySelector('.vol-waves').style.display = panel.muted ? 'none' : '';
      }
    });
  }

  function renderPatternList() {
    const list = document.getElementById('patterns-list');
    list.innerHTML = '';
    const names = listPatterns(APP_ID);
    if (names.length === 0) {
      const em = document.createElement('div');
      em.id = 'patterns-list-empty';
      em.textContent = 'No saved patterns yet.';
      list.appendChild(em);
      return;
    }
    names.forEach(name => {
      const row = document.createElement('div');
      row.className = 'pattern-row';

      const nameEl = document.createElement('span');
      nameEl.className = 'pattern-row-name';
      nameEl.textContent = name;
      nameEl.addEventListener('click', () => {
        const data = loadPattern(APP_ID, name);
        if (data) { applyState(data); closePatterns(); }
      });

      const del = document.createElement('button');
      del.className = 'pattern-row-del';
      del.textContent = '✕';
      del.title = 'Delete pattern';
      del.addEventListener('click', e => {
        e.stopPropagation();
        deletePattern(APP_ID, name);
        renderPatternList();
      });

      row.appendChild(nameEl);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  function closePatterns() {
    document.getElementById('patterns-popover').classList.remove('open');
  }

  document.getElementById('patterns-btn').addEventListener('click', e => {
    e.stopPropagation();
    const pop = document.getElementById('patterns-popover');
    const opening = !pop.classList.contains('open');
    pop.classList.toggle('open');
    if (opening) renderPatternList();
  });

  document.getElementById('patterns-save-btn').addEventListener('click', () => {
    const input = document.getElementById('patterns-name-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    savePattern(APP_ID, name, captureState());
    input.value = '';
    renderPatternList();
  });

  document.getElementById('patterns-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('patterns-save-btn').click();
    if (e.key === 'Escape') closePatterns();
  });

  // Close popover on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.patterns-group')) closePatterns();
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !['INPUT','BUTTON','SELECT','TEXTAREA'].includes(e.target.tagName)) {
      e.preventDefault();
      toggleTransport();
    }
  });

  /* ════════════════════════════════════════════════════════════
     AUDIO UNLOCK
  ════════════════════════════════════════════════════════════ */

  const banner = document.getElementById('audio-banner');
  ['pointerdown', 'keydown'].forEach(evt =>
    document.addEventListener(evt, () => {
      if (ctx) ctx.resume().then(() => { if (ctx.state === 'running') banner.classList.add('hidden'); });
      else banner.classList.add('hidden');
    }, { passive: true })
  );

})();
</script>

<style>
  #rotate-prompt {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: #080c10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #6a8f80;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
  }
  #rotate-prompt svg { opacity: 0.5; animation: rotate-hint 2s ease-in-out infinite; }
  @keyframes rotate-hint {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
  @media (pointer: coarse) and (orientation: portrait) {
    #rotate-prompt { display: flex; }
  }
  body.is-touch.is-portrait #rotate-prompt { display: flex; }
</style>
<script>
  (function() {
    var isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
    if (isTouch) {
      document.body.classList.add('is-touch');
      function checkOrientation() {
        document.body.classList.toggle('is-portrait', window.innerHeight > window.innerWidth);
      }
      checkOrientation();
      window.addEventListener('resize', checkOrientation);
    }
  })();
</script>
<div id="rotate-prompt">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="5" y="2" width="14" height="20" rx="2"/>
    <path d="M12 18h.01"/>
  </svg>
  <p>Rotate for best experience</p>
</div>

</body>
