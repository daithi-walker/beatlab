<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multibank — 16-step synth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1318;
    --surface-2: #121920;
    --divider:   #1a2830;
    --text:      #d4e8e0;
    --muted:     #6a8f80;
    --faint:     #2e4a40;
    --teal:      #00e5cc;
    --green:     #39ff6a;
    --amber:     #f5a623;
    --purple:    #b06fff;
    --pink:      #ff6b9d;
    --topbar-h:  52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100%; }

  /* ── TOP BAR ──────────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    display: flex; align-items: center; gap: 12px; padding: 0 20px;
    background: rgba(8,12,16,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--divider); z-index: 10;
  }
  .logo { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal); flex-shrink: 0; }

  .topbar-btn {
    font-family: inherit; font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--teal); background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.35); border-radius: 999px;
    padding: 6px 14px; cursor: pointer; flex-shrink: 0;
    transition: background 120ms, border-color 120ms;
  }
  .topbar-btn:hover   { background: rgba(0,229,204,0.16); }
  .topbar-btn.playing { background: rgba(0,229,204,0.18); border-color: var(--teal); }

  .divider-v { width: 1px; height: 24px; background: var(--divider); flex-shrink: 0; }

  #bank-type-select {
    font-family: inherit; font-size: 0.65rem; letter-spacing: 0.06em;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--divider); border-radius: 6px;
    padding: 5px 8px; cursor: pointer; outline: none;
  }
  #bank-type-select:focus { border-color: var(--teal); }

  .bpm-group { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctrl-label { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .ctrl-value { font-size: 0.7rem; color: var(--teal); min-width: 3ch; text-align: right; font-variant-numeric: tabular-nums; }

  /* ── SLIDERS ──────────────────────────────────────────────── */
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 3px; background: var(--divider); border-radius: 999px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent, var(--teal)); box-shadow: 0 0 6px var(--accent, var(--teal));
    cursor: pointer; transition: transform 100ms;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: var(--accent, var(--teal)); box-shadow: 0 0 6px var(--accent, var(--teal));
  }
  #bpm-slider { width: 90px; }

  /* ── MAIN ─────────────────────────────────────────────────── */
  #main { padding: calc(var(--topbar-h) + 16px) 20px 80px; display: flex; flex-direction: column; gap: 8px; }

  #empty-hint {
    display: flex; align-items: center; justify-content: center;
    height: 160px; color: var(--faint);
    font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* ── PANEL ROW (panel + collapsible fx strip) ─────────────── */
  .panel-row { display: flex; flex-direction: column; animation: panel-in 180ms cubic-bezier(0.16,1,0.3,1); }
  @keyframes panel-in { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

  .panel {
    background: var(--surface); border: 1px solid var(--divider); border-radius: 8px;
    padding: 10px 14px;
    display: grid; grid-template-columns: 80px 1fr;
    align-items: center; gap: 14px;
    transition: border-color 200ms, border-radius 120ms;
  }
  .panel-row.open .panel {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    border-bottom-color: transparent;
  }
  .panel:hover { border-color: color-mix(in srgb, var(--accent) 30%, transparent); }

  .panel[data-color="0"] { --accent: var(--teal);   }
  .panel[data-color="1"] { --accent: var(--green);  }
  .panel[data-color="2"] { --accent: var(--amber);  }
  .panel[data-color="3"] { --accent: var(--purple); }
  .panel[data-color="4"] { --accent: var(--pink);   }

  /* Panel meta (left column) */
  .panel-meta { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .meta-header { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .panel-name { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
  .panel-type { font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }

  .delete-btn {
    background: none; border: none; color: var(--faint); cursor: pointer;
    font-size: 0.75rem; line-height: 1; padding: 2px; flex-shrink: 0;
    transition: color 120ms;
  }
  .delete-btn:hover { color: var(--text); }

  .mute-btn {
    font-family: inherit; font-size: 0.52rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: transparent;
    border: 1px solid var(--divider); border-radius: 4px;
    padding: 3px 0; cursor: pointer; width: 100%;
    transition: color 120ms, border-color 120ms, background 120ms;
  }
  .mute-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mute-btn.muted { color: var(--bg); background: var(--accent); border-color: var(--accent); }

  .note-select {
    font-family: inherit; font-size: 0.6rem; letter-spacing: 0.04em;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--divider); border-radius: 4px;
    padding: 3px 5px; cursor: pointer; outline: none; width: 100%;
  }
  .note-select:focus { border-color: var(--accent); }

  /* ── STEP GRID ────────────────────────────────────────────── */
  .steps {
    display: grid;
    /* 4 groups of 4 with a thin gap between groups */
    grid-template-columns: repeat(4,1fr) 6px repeat(4,1fr) 6px repeat(4,1fr) 6px repeat(4,1fr);
    gap: 4px; align-items: center;
  }
  .step-divider { width: 1px; height: 22px; background: var(--divider); justify-self: center; }

  .step {
    aspect-ratio: 1; min-width: 0; border-radius: 4px;
    border: 1px solid var(--divider); background: var(--surface-2);
    cursor: pointer; transition: background 80ms, border-color 80ms, box-shadow 80ms;
  }
  .step:hover { border-color: color-mix(in srgb, var(--accent) 60%, transparent); }
  .step.on {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
  }
  .step.current { border-color: var(--accent); box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 65%, transparent); }
  .step.on.current { background: #fff; border-color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.55); }

  /* ── FX TOGGLE BUTTON (inside panel meta) ─────────────────── */
  .fx-toggle {
    font-family: inherit; font-size: 0.52rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: transparent;
    border: 1px solid var(--divider); border-radius: 4px;
    padding: 3px 0; cursor: pointer; width: 100%;
    transition: color 120ms, border-color 120ms, background 120ms;
  }
  .fx-toggle:hover     { border-color: var(--accent); color: var(--accent); }
  .fx-toggle.active    { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }

  /* ── FX STRIP (mixer row below each panel) ─────────────────── */
  .fx-strip {
    display: none;
    background: var(--surface-2);
    border: 1px solid var(--divider);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 12px 16px 14px;
    gap: 0;
    align-items: flex-end;
    overflow: hidden;
  }
  .panel-row.open .fx-strip { display: flex; }

  /* Separator between base controls and synth effects */
  .fx-sep {
    width: 1px; background: var(--divider);
    align-self: stretch; margin: 0 16px; flex-shrink: 0;
  }

  /* Each effect column: label → slider → value */
  .fx-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    flex: 1; min-width: 0;
  }
  .fx-col-label {
    font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); white-space: nowrap;
  }
  .fx-col-val {
    font-size: 0.58rem; color: var(--accent);
    font-variant-numeric: tabular-nums; min-width: 3ch; text-align: center;
  }
  .fx-col input[type="range"] { width: 100%; }

  /* ── BEAT DOTS ────────────────────────────────────────────── */
  #beat-row {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; align-items: center; pointer-events: none;
  }
  .beat-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--divider); transition: background 60ms, box-shadow 60ms; }
  .beat-dot.quarter { width: 7px; height: 7px; }
  .beat-dot.active  { background: var(--teal); box-shadow: 0 0 6px var(--teal); }

  /* ── AUDIO BANNER ─────────────────────────────────────────── */
  #audio-banner {
    position: fixed; top: calc(var(--topbar-h) + 12px); left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--teal); background: rgba(14,19,24,0.9);
    border: 1px solid rgba(0,229,204,0.2); border-radius: 999px;
    padding: 8px 18px; backdrop-filter: blur(12px); z-index: 20; transition: opacity 300ms;
  }
  #audio-banner.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<header id="topbar">
  <a href="../index.html" class="topbar-btn" style="text-decoration:none;font-size:11px;letter-spacing:.08em;">⌂ BeatLab</a>
  <div class="divider-v"></div>
  <div class="logo">Multibank</div>
  <button class="topbar-btn" id="play-btn">▶ Play</button>

  <div class="divider-v"></div>

  <button class="topbar-btn" id="add-bank-btn">＋ Add Bank</button>

  <div class="bpm-group">
    <span class="ctrl-label">BPM</span>
    <input type="range" id="bpm-slider" min="60" max="200" value="120">
    <span class="ctrl-value" id="bpm-value">120</span>
  </div>
</header>

<div id="main">
  <div id="empty-hint">← add a bank to get started</div>
</div>

<div id="beat-row" aria-hidden="true"></div>
<div id="audio-banner">tap anywhere to enable audio</div>

<script type="module">
import { noteStringToFreq as noteToFreq, makeImpulse, makePinkNoise, makeWhiteNoise, distCurve as makeDistortionCurve } from '../core/audio.js';

(() => {
  'use strict';

  /* ════════════════════════════════════════════════════════════
     CONSTANTS
  ════════════════════════════════════════════════════════════ */
  const STEPS     = 16;
  const LOOKAHEAD = 0.1;   // schedule this many seconds ahead
  const TICK_MS   = 25;    // scheduler poll interval

  const ACCENT_COLORS = 5; // cycles 0–4

  const NOTES = [
    'C2','D2','E2','F2','G2','A2','B2',
    'C3','D3','E3','F3','G3','A3','B3',
    'C4','D4','E4','F4','G4','A4','B4',
  ];

  /* ════════════════════════════════════════════════════════════
     BANK TYPE DEFINITIONS
     Each entry defines default audio settings for that voice.
     Actual panel instances are created dynamically by addPanel().
  ════════════════════════════════════════════════════════════ */
  const BANK_TYPES = {
    // Drums                                                    dist  delay chorus lfoRate
    kick:    { name:'Kick',     type:'drum',   volume:0.9,  filter:900,   reverb:0.06, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    snare:   { name:'Snare',    type:'drum',   volume:0.75, filter:5000,  reverb:0.18, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    hihat:   { name:'Hi-Hat',   type:'drum',   volume:0.45, filter:12000, reverb:0.05, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    clap:    { name:'Clap',     type:'drum',   volume:0.7,  filter:5000,  reverb:0.22, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    tomhi:   { name:'Tom Hi',   type:'drum',   volume:0.8,  filter:2000,  reverb:0.1,  distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    tomlo:   { name:'Tom Lo',   type:'drum',   volume:0.85, filter:1000,  reverb:0.08, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    openhat: { name:'Open Hat', type:'drum',   volume:0.4,  filter:12000, reverb:0.12, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    crash:   { name:'Crash',    type:'drum',   volume:0.35, filter:8000,  reverb:0.45, distortion:0,    delay:0,    chorus:0,    lfoRate:0   },
    // Melodic
    bass:    { name:'Bass',     type:'melody', volume:0.8,  filter:700,   reverb:0.12, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D2' },
    sub:     { name:'Sub',      type:'melody', volume:0.9,  filter:400,   reverb:0.05, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D2' },
    lead:    { name:'Lead',     type:'melody', volume:0.55, filter:3000,  reverb:0.3,  distortion:0,    delay:0.3,  chorus:0,    lfoRate:0,   note:'A3' },
    pluck:   { name:'Pluck',    type:'melody', volume:0.7,  filter:4000,  reverb:0.15, distortion:0,    delay:0,    chorus:0,    lfoRate:0,   note:'D3' },
    pad:     { name:'Pad',      type:'melody', volume:0.5,  filter:2000,  reverb:0.5,  distortion:0,    delay:0,    chorus:0.4,  lfoRate:0.4, note:'A3' },
  };

  /* ════════════════════════════════════════════════════════════
     TRANSPORT STATE
  ════════════════════════════════════════════════════════════ */
  let playing      = false;
  let currentStep  = 0;
  let nextBeatTime = 0;
  let bpm          = 120;
  let tickTimer    = null;

  function stepDuration() { return 60 / bpm / 4; }

  /* ════════════════════════════════════════════════════════════
     ACTIVE PANELS  (starts empty, grows as user adds banks)
  ════════════════════════════════════════════════════════════ */
  let panels = [];           // array of panel objects
  let instanceCounter = 0;  // unique ID for each panel instance
  const nodes = {};         // instanceId → { filter, gain, reverbSend }

  /* ════════════════════════════════════════════════════════════
     AUDIO ENGINE
  ════════════════════════════════════════════════════════════ */
  let ctx, masterGain, compressor, reverbConvolver, reverbReturn;
  let pinkBuf, whiteBuf;

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.gain.value = 0.85;

    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.ratio.value = 4;

    masterGain.connect(compressor);
    compressor.connect(ctx.destination);

    // Shared reverb — all panel reverbSend nodes feed this
    reverbConvolver = ctx.createConvolver();
    reverbConvolver.buffer = makeImpulse(ctx, 2.5, 2.8);
    reverbReturn = ctx.createGain();
    reverbReturn.gain.value = 0.9;
    reverbConvolver.connect(reverbReturn);
    reverbReturn.connect(masterGain);

    // Noise buffers — pre-generated once, shared across all drum hits
    pinkBuf  = makePinkNoise(ctx, 2);
    whiteBuf = makeWhiteNoise(ctx, 2);  // 2s so crash has enough tail
  }

  function buildPanelNodes(panel) {
    /*
       Full signal chain per panel:

         voice
           → distortion (WaveShaper, bypass when curve=null)
           → filter     (BiquadFilter lowpass)  ← filterLfo modulates frequency
           → gain       (volume)
           → masterGain                           dry path
           → reverbSend → reverbConvolver         reverb send
           → delaySend  → delayNode ⟲ feedback   delay send
           → chorusSend → chorusDelay ← chorusLfo chorus send
    */

    // Entry point: distortion (pass-through when curve=null)
    const distortion = ctx.createWaveShaper();
    distortion.curve = makeDistortionCurve(panel.distortion);
    distortion.oversample = '2x';

    // Filter + LFO
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = panel.filter;
    filter.Q.value = 1;

    const filterLfo = ctx.createOscillator();
    filterLfo.type = 'sine';
    filterLfo.frequency.value = panel.lfoRate;
    const filterLfoGain = ctx.createGain();
    filterLfoGain.gain.value = panel.lfoRate > 0 ? panel.filter * 0.5 : 0;
    filterLfo.connect(filterLfoGain);
    filterLfoGain.connect(filter.frequency);
    filterLfo.start();

    // Volume
    const gain = ctx.createGain();
    gain.gain.value = panel.volume;

    // Reverb send
    const reverbSend = ctx.createGain();
    reverbSend.gain.value = panel.reverb;

    // Delay: 8th-note time, 40% fixed feedback
    const delaySend = ctx.createGain();
    delaySend.gain.value = panel.delay;
    const delayNode = ctx.createDelay(2.0);
    delayNode.delayTime.value = 60 / bpm / 2;
    const delayFeedback = ctx.createGain();
    delayFeedback.gain.value = 0.4;
    delaySend.connect(delayNode);
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);
    delayNode.connect(masterGain);

    // Chorus: 20ms base delay modulated at 1.2 Hz
    const chorusSend = ctx.createGain();
    chorusSend.gain.value = panel.chorus;
    const chorusDelay = ctx.createDelay(0.05);
    chorusDelay.delayTime.value = 0.02;
    const chorusLfo = ctx.createOscillator();
    chorusLfo.type = 'sine';
    chorusLfo.frequency.value = 1.2;
    const chorusLfoGain = ctx.createGain();
    chorusLfoGain.gain.value = 0.008; // ±8ms modulation depth
    chorusLfo.connect(chorusLfoGain);
    chorusLfoGain.connect(chorusDelay.delayTime);
    chorusLfo.start();
    chorusSend.connect(chorusDelay);
    chorusDelay.connect(masterGain);

    // Wire the main chain
    distortion.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    gain.connect(reverbSend);
    gain.connect(delaySend);
    gain.connect(chorusSend);
    reverbSend.connect(reverbConvolver);

    nodes[panel.instanceId] = {
      entry: distortion,   // voices connect here
      distortion, filter, filterLfo, filterLfoGain,
      gain, reverbSend,
      delaySend, delayNode, delayFeedback,
      chorusSend, chorusDelay, chorusLfo,
    };
  }

  function teardownPanelNodes(instanceId) {
    const n = nodes[instanceId];
    if (!n) return;
    try { n.filterLfo.stop(); n.chorusLfo.stop(); } catch (_) {}
    try {
      [n.distortion, n.filter, n.filterLfoGain, n.gain,
       n.reverbSend, n.delaySend, n.delayNode, n.delayFeedback,
       n.chorusSend, n.chorusDelay].forEach(node => node.disconnect());
    } catch (_) {}
    delete nodes[instanceId];
  }

  /* ════════════════════════════════════════════════════════════
     SYNTH VOICES
     Each takes (time, dest, panel?) and creates short-lived nodes
     that auto-GC after osc.stop() / source.stop().
  ════════════════════════════════════════════════════════════ */

  function playKick(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    g.gain.setValueAtTime(1.8, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.5);
  }

  function playSnare(time, dest) {
    // Body: tonal crack
    const body = ctx.createOscillator(), bg = ctx.createGain();
    body.type = 'triangle';
    body.frequency.setValueAtTime(220, time);
    body.frequency.exponentialRampToValueAtTime(100, time + 0.06);
    bg.gain.setValueAtTime(1.0, time);
    bg.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    body.connect(bg); bg.connect(dest);
    body.start(time); body.stop(time + 0.15);
    // Noise: snare rattle
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), ng = ctx.createGain();
    ns.buffer = pinkBuf;
    hp.type = 'highpass'; hp.frequency.value = 2000;
    ng.gain.setValueAtTime(1.2, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    ns.connect(hp); hp.connect(ng); ng.connect(dest);
    ns.start(time); ns.stop(time + 0.2);
  }

  function playHihat(time, dest) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf;
    hp.type = 'highpass'; hp.frequency.value = 7000;
    g.gain.setValueAtTime(0.7, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    ns.connect(hp); hp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 0.08);
  }

  function playClap(time, dest) {
    // Three fast noise bursts in quick succession — the flamming gives it body
    [0, 0.008, 0.018].forEach(offset => {
      const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
      ns.buffer = pinkBuf;
      hp.type = 'highpass'; hp.frequency.value = 1600;
      g.gain.setValueAtTime(0.9, time + offset);
      g.gain.exponentialRampToValueAtTime(0.001, time + offset + 0.07);
      ns.connect(hp); hp.connect(g); g.connect(dest);
      ns.start(time + offset); ns.stop(time + offset + 0.09);
    });
  }

  function playTomHi(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(80, time + 0.15);
    g.gain.setValueAtTime(1.3, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.35);
  }

  function playTomLo(time, dest) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(100, time);
    osc.frequency.exponentialRampToValueAtTime(45, time + 0.2);
    g.gain.setValueAtTime(1.5, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.5);
  }

  function playOpenHat(time, dest) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf;
    hp.type = 'highpass'; hp.frequency.value = 7000;
    g.gain.setValueAtTime(0.6, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    ns.connect(hp); hp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 0.38);
  }

  function playCrash(time, dest) {
    const ns = ctx.createBufferSource();
    ns.buffer = whiteBuf;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 3000;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 8000; bp.Q.value = 0.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.5, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 1.4);
    ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest);
    ns.start(time); ns.stop(time + 1.5);
  }

  function playBass(time, dest, freq) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.9, time + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.28);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.32);
  }

  function playSub(time, dest, freq) {
    // Plays an octave below the selected note — pure sine for maximum sub weight
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq / 2;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(1.0, time + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.55);
  }

  function playLead(time, dest, freq) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.7, time + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.26);
  }

  function playPluck(time, dest, freq) {
    // Very fast decay — the brevity is what makes it sound "plucked"
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.9, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    osc.connect(g); g.connect(dest);
    osc.start(time); osc.stop(time + 0.1);
  }

  function playPad(time, dest, freq) {
    // Two slightly detuned oscillators with slow attack → wide, ambient wash
    [-6, 6].forEach(detune => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq; osc.detune.value = detune;
      g.gain.setValueAtTime(0.001, time);
      g.gain.linearRampToValueAtTime(0.35, time + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
      osc.connect(g); g.connect(dest);
      osc.start(time); osc.stop(time + 0.88);
    });
  }

  /* Voice dispatch — maps typeKey to the right function */
  const VOICES = {
    kick:    (t, d)    => playKick(t, d),
    snare:   (t, d)    => playSnare(t, d),
    hihat:   (t, d)    => playHihat(t, d),
    clap:    (t, d)    => playClap(t, d),
    tomhi:   (t, d)    => playTomHi(t, d),
    tomlo:   (t, d)    => playTomLo(t, d),
    openhat: (t, d)    => playOpenHat(t, d),
    crash:   (t, d)    => playCrash(t, d),
    bass:    (t, d, p) => playBass(t, d, noteToFreq(p.note)),
    sub:     (t, d, p) => playSub(t, d, noteToFreq(p.note)),
    lead:    (t, d, p) => playLead(t, d, noteToFreq(p.note)),
    pluck:   (t, d, p) => playPluck(t, d, noteToFreq(p.note)),
    pad:     (t, d, p) => playPad(t, d, noteToFreq(p.note)),
  };

  /* ════════════════════════════════════════════════════════════
     PANEL MANAGEMENT
  ════════════════════════════════════════════════════════════ */

  function addPanel(typeKey) {
    if (!ctx) initAudio();
    ctx.resume();

    const template = BANK_TYPES[typeKey];
    if (!template) return;

    const id = instanceCounter++;
    const panel = {
      instanceId: id,
      typeKey,
      name:   template.name,
      type:   template.type,
      color:  id % ACCENT_COLORS,
      steps:  Array(STEPS).fill(false),
      muted:  false,
      volume:     template.volume,
      filter:     template.filter,
      reverb:     template.reverb,
      distortion: template.distortion,
      delay:      template.delay,
      chorus:     template.chorus,
      lfoRate:    template.lfoRate,
      note:       template.note || 'A3',
    };

    panels.push(panel);
    buildPanelNodes(panel);
    renderPanel(panel);

    document.getElementById('empty-hint')?.remove();
  }

  function removePanel(instanceId) {
    const idx = panels.findIndex(p => p.instanceId === instanceId);
    if (idx < 0) return;
    panels.splice(idx, 1);
    teardownPanelNodes(instanceId);
    delete strips[instanceId];
    document.querySelector(`.panel-row[data-instance-id="${instanceId}"]`)?.remove();
    if (panels.length === 0) {
      const hint = document.createElement('div');
      hint.id = 'empty-hint';
      hint.textContent = '← add a bank to get started';
      document.getElementById('main').appendChild(hint);
    }
  }

  /* ════════════════════════════════════════════════════════════
     SCHEDULER
     Queues audio events to the audio clock (not setTimeout) so
     timing stays solid regardless of tab focus or JS jank.
  ════════════════════════════════════════════════════════════ */

  function scheduleStep(step, time) {
    panels.forEach(panel => {
      if (!panel.steps[step] || panel.muted) return;
      const dest = nodes[panel.instanceId].entry;
      VOICES[panel.typeKey](time, dest, panel);
    });

    const msUntil = Math.max(0, (time - ctx.currentTime) * 1000);
    setTimeout(() => updatePlayhead(step), msUntil);
  }

  function tick() {
    while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
      scheduleStep(currentStep, nextBeatTime);
      nextBeatTime += stepDuration();
      currentStep = (currentStep + 1) % STEPS;
    }
  }

  /* ════════════════════════════════════════════════════════════
     TRANSPORT
  ════════════════════════════════════════════════════════════ */

  function startTransport() {
    if (!ctx) initAudio();
    ctx.resume();
    playing      = true;
    currentStep  = 0;
    nextBeatTime = ctx.currentTime + 0.05;
    tickTimer    = setInterval(tick, TICK_MS);
    document.getElementById('play-btn').textContent = '◼ Stop';
    document.getElementById('play-btn').classList.add('playing');
  }

  function stopTransport() {
    playing = false;
    clearInterval(tickTimer);
    clearPlayhead();
    document.getElementById('play-btn').textContent = '▶ Play';
    document.getElementById('play-btn').classList.remove('playing');
  }

  function toggleTransport() {
    if (playing) stopTransport(); else startTransport();
  }

  /* ════════════════════════════════════════════════════════════
     UI — PANEL RENDERING
  ════════════════════════════════════════════════════════════ */

  // instanceId → fx-strip element, needed for removePanel cleanup
  const strips = {};

  function renderPanel(panel) {
    const row = document.createElement('div');
    row.className = 'panel-row';
    row.dataset.instanceId = panel.instanceId;

    const el = document.createElement('div');
    el.className = 'panel';
    el.dataset.instanceId = panel.instanceId;
    el.dataset.color      = panel.color;

    /* Left: meta */
    const meta = document.createElement('div');
    meta.className = 'panel-meta';

    const header = document.createElement('div');
    header.className = 'meta-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'panel-name';
    nameEl.textContent = panel.name;

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '✕';
    deleteBtn.title = 'Remove bank';
    deleteBtn.addEventListener('click', () => removePanel(panel.instanceId));

    header.appendChild(nameEl);
    header.appendChild(deleteBtn);
    meta.appendChild(header);

    // Type selector — lets the user change the bank type after adding it
    const typeSelect = document.createElement('select');
    typeSelect.className = 'note-select'; // reuse same compact select style
    const DRUM_TYPES    = ['kick','snare','hihat','clap','tomhi','tomlo','openhat','crash'];
    const MELODY_TYPES  = ['bass','sub','lead','pluck','pad'];
    const drumGroup     = document.createElement('optgroup');
    drumGroup.label     = 'Drums';
    DRUM_TYPES.forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = BANK_TYPES[k].name;
      if (k === panel.typeKey) o.selected = true;
      drumGroup.appendChild(o);
    });
    const melodyGroup   = document.createElement('optgroup');
    melodyGroup.label   = 'Melodic';
    MELODY_TYPES.forEach(k => {
      const o = document.createElement('option');
      o.value = k; o.textContent = BANK_TYPES[k].name;
      if (k === panel.typeKey) o.selected = true;
      melodyGroup.appendChild(o);
    });
    typeSelect.appendChild(drumGroup);
    typeSelect.appendChild(melodyGroup);

    typeSelect.addEventListener('change', e => {
      const newKey      = e.target.value;
      const template    = BANK_TYPES[newKey];
      panel.typeKey     = newKey;
      panel.name        = template.name;
      panel.type        = template.type;
      nameEl.textContent = template.name;
      // Show or hide the note picker depending on whether the new type is melodic
      noteWrap.style.display = template.type === 'melody' ? '' : 'none';
    });
    meta.appendChild(typeSelect);

    const muteBtn = document.createElement('button');
    muteBtn.className = 'mute-btn';
    muteBtn.textContent = 'Mute';
    muteBtn.addEventListener('click', () => {
      panel.muted = !panel.muted;
      muteBtn.classList.toggle('muted', panel.muted);
      muteBtn.textContent = panel.muted ? 'Muted' : 'Mute';
    });
    meta.appendChild(muteBtn);

    const fxToggle = document.createElement('button');
    fxToggle.className = 'fx-toggle';
    fxToggle.textContent = 'FX ▾';
    fxToggle.addEventListener('click', () => {
      const open = row.classList.toggle('open');
      fxToggle.classList.toggle('active', open);
      fxToggle.textContent = open ? 'FX ▴' : 'FX ▾';
    });
    meta.appendChild(fxToggle);

    // Note picker — always in the DOM, shown only for melodic types
    const noteWrap = document.createElement('div');
    noteWrap.style.display = panel.type === 'melody' ? '' : 'none';
    const noteSel = document.createElement('select');
    noteSel.className = 'note-select';
    NOTES.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      if (n === panel.note) opt.selected = true;
      noteSel.appendChild(opt);
    });
    noteSel.addEventListener('change', e => { panel.note = e.target.value; });
    noteWrap.appendChild(noteSel);
    meta.appendChild(noteWrap);

    el.appendChild(meta);
    el.appendChild(buildStepGrid(panel));

    const strip = buildFxStrip(panel);
    strips[panel.instanceId] = strip;

    row.appendChild(el);
    row.appendChild(strip);
    document.getElementById('main').appendChild(row);
  }

  function buildStepGrid(panel) {
    const grid = document.createElement('div');
    grid.className = 'steps';

    let dragIntent = null;

    for (let s = 0; s < STEPS; s++) {
      if (s > 0 && s % 4 === 0) {
        const div = document.createElement('div');
        div.className = 'step-divider';
        grid.appendChild(div);
      }

      const btn = document.createElement('button');
      btn.className = 'step';
      btn.dataset.instanceId = panel.instanceId;
      btn.dataset.step       = s;

      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        dragIntent = panel.steps[s] ? 'off' : 'on';
        applyIntent(panel, btn, s, dragIntent);
      });

      btn.addEventListener('pointermove', e => {
        if (dragIntent === null) return;
        const target = document.elementFromPoint(e.clientX, e.clientY);
        if (!target?.dataset.step || target.dataset.instanceId !== String(panel.instanceId)) return;
        applyIntent(panel, target, parseInt(target.dataset.step, 10), dragIntent);
      });

      btn.addEventListener('pointerup',     () => { dragIntent = null; });
      btn.addEventListener('pointercancel', () => { dragIntent = null; });

      grid.appendChild(btn);
    }

    return grid;
  }

  function applyIntent(panel, btn, step, intent) {
    const wantOn = intent === 'on';
    if (panel.steps[step] === wantOn) return;
    panel.steps[step] = wantOn;
    btn.classList.toggle('on', wantOn);
  }

  function buildFxStrip(panel) {
    const strip = document.createElement('div');
    strip.className = 'fx-strip';

    const nd = () => nodes[panel.instanceId];

    // Base controls
    strip.appendChild(makeFxCol('Vol', 0, 1, 0.01, panel.volume,
      v => Math.round(v * 100) + '%',
      v => { panel.volume = v; nd()?.gain.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    strip.appendChild(makeFxCol('Filter', 80, 12000, 10, panel.filter,
      v => v < 1000 ? Math.round(v) + 'Hz' : (v / 1000).toFixed(1) + 'k',
      v => { panel.filter = v; nd()?.filter.frequency.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    strip.appendChild(makeFxCol('LFO', 0, 8, 0.1, panel.lfoRate,
      v => v === 0 ? 'off' : v.toFixed(1) + 'Hz',
      v => {
        panel.lfoRate = v;
        if (nd()) {
          nd().filterLfo.frequency.setTargetAtTime(v, ctx.currentTime, 0.05);
          nd().filterLfoGain.gain.setTargetAtTime(v > 0 ? panel.filter * 0.5 : 0, ctx.currentTime, 0.05);
        }
      }
    ));
    strip.appendChild(makeFxCol('Reverb', 0, 1, 0.01, panel.reverb,
      v => Math.round(v * 100) + '%',
      v => { panel.reverb = v; nd()?.reverbSend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));

    // Visual separator
    const sep = document.createElement('div');
    sep.className = 'fx-sep';
    strip.appendChild(sep);

    // Synth effects
    strip.appendChild(makeFxCol('Delay', 0, 1, 0.01, panel.delay,
      v => Math.round(v * 100) + '%',
      v => { panel.delay = v; nd()?.delaySend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));
    strip.appendChild(makeFxCol('Distort', 0, 1, 0.01, panel.distortion,
      v => Math.round(v * 100) + '%',
      v => { panel.distortion = v; if (nd()) nd().distortion.curve = makeDistortionCurve(v); }
    ));
    strip.appendChild(makeFxCol('Chorus', 0, 1, 0.01, panel.chorus,
      v => Math.round(v * 100) + '%',
      v => { panel.chorus = v; nd()?.chorusSend.gain.setTargetAtTime(v, ctx.currentTime, 0.05); }
    ));

    return strip;
  }

  function makeFxCol(label, min, max, step, value, format, onChange) {
    const col = document.createElement('div');
    col.className = 'fx-col';

    const lbl = document.createElement('span');
    lbl.className = 'fx-col-label';
    lbl.textContent = label;

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.step = step; slider.value = value;

    const val = document.createElement('span');
    val.className = 'fx-col-val';
    val.textContent = format(value);

    slider.addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      val.textContent = format(v);
      onChange(v);
    });

    col.appendChild(lbl); col.appendChild(slider); col.appendChild(val);
    return col;
  }

  /* ════════════════════════════════════════════════════════════
     PLAYHEAD
  ════════════════════════════════════════════════════════════ */

  let lastHighlight = -1;

  function updatePlayhead(step) {
    if (lastHighlight >= 0) {
      document.querySelectorAll(`.step[data-step="${lastHighlight}"]`).forEach(el => el.classList.remove('current'));
      const prev = document.querySelectorAll('.beat-dot')[lastHighlight];
      if (prev) prev.classList.remove('active');
    }
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    const dot = document.querySelectorAll('.beat-dot')[step];
    if (dot) dot.classList.add('active');
    lastHighlight = step;
  }

  function clearPlayhead() {
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll('.beat-dot.active').forEach(el => el.classList.remove('active'));
    lastHighlight = -1;
  }

  /* ════════════════════════════════════════════════════════════
     STATIC UI & CONTROLS
  ════════════════════════════════════════════════════════════ */

  // Beat dots
  const beatRow = document.getElementById('beat-row');
  for (let i = 0; i < STEPS; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot' + (i % 4 === 0 ? ' quarter' : '');
    beatRow.appendChild(dot);
  }

  document.getElementById('play-btn').addEventListener('click', toggleTransport);

  document.getElementById('add-bank-btn').addEventListener('click', () => {
    addPanel('kick');
  });

  document.getElementById('bpm-slider').addEventListener('input', e => {
    bpm = parseInt(e.target.value, 10);
    document.getElementById('bpm-value').textContent = bpm;
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT') {
      e.preventDefault();
      toggleTransport();
    }
  });

  /* ════════════════════════════════════════════════════════════
     AUDIO UNLOCK
  ════════════════════════════════════════════════════════════ */

  const banner = document.getElementById('audio-banner');
  ['pointerdown', 'keydown'].forEach(evt =>
    document.addEventListener(evt, () => {
      if (ctx) ctx.resume().then(() => { if (ctx.state === 'running') banner.classList.add('hidden'); });
      else banner.classList.add('hidden');
    }, { passive: true })
  );

})();
</script>

    50% { transform: rotate(90deg); }
  }
  @media (pointer: coarse) and (orientation: portrait) {
    #rotate-prompt { display: flex; }
  }
