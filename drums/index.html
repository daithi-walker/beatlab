<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drums — BeatLab</title>
<link rel="icon" type="image/png" href="../icon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1318;
    --surface-2: #121920;
    --divider:   #1a2830;
    --text:      #d4e8e0;
    --muted:     #6a8f80;
    --faint:     #2e4a40;
    --teal:      #00e5cc;
    --green:     #39ff6a;
    --amber:     #f5a623;
    --purple:    #b06fff;
    --pink:      #ff6b9d;
    --topbar-h:  52px;
    --label-w:   88px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; -webkit-overflow-scrolling: touch; }

  /* ── TOP BAR ──────────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    background: rgba(8,12,16,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    z-index: 100; overflow-x: auto; overflow-y: hidden;
  }
  .topbar-btn {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--teal); background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.2); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 120ms, border-color 120ms, color 120ms;
  }
  .topbar-btn:hover   { background: rgba(0,229,204,0.16); }
  .topbar-btn.playing { background: rgba(0,229,204,0.18); border-color: var(--teal); }
  .divider-v { width: 1px; height: 24px; background: var(--divider); flex-shrink: 0; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctrl-label { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .ctrl-value {
    font-size: 0.7rem; color: var(--teal); width: 3.6ch; text-align: center;
    font-variant-numeric: tabular-nums; background: none; border: none;
    border-bottom: 1px solid var(--divider); padding: 0; font-family: inherit;
    -moz-appearance: textfield;
  }
  .ctrl-value:focus { outline: none; border-bottom-color: var(--teal); }
  .ctrl-value::-webkit-inner-spin-button,
  .ctrl-value::-webkit-outer-spin-button { -webkit-appearance: none; }
  #vol-slider { width: 72px; }
  #right-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ── TOPBAR DROPDOWNS ─────────────────────────────────────── */
  .tb-drop { position: relative; flex-shrink: 0; }
  .tb-drop-btn {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.06em;
    color: var(--text); background: none; border: none;
    padding: 6px 8px; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
    border-radius: 6px; transition: background 120ms, color 120ms;
  }
  .tb-drop-btn:hover { background: rgba(255,255,255,0.05); }
  .tb-drop-btn.open { color: var(--teal); }
  .tb-drop-btn svg { opacity: 0.45; transition: opacity 120ms; }
  .tb-drop-btn.open svg, .tb-drop-btn:hover svg { opacity: 0.8; }

  /* App logo button */
  #app-logo-btn {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    background: none; border: none; padding: 0; cursor: pointer;
    overflow: hidden; opacity: 0.85; transition: opacity 120ms;
  }
  #app-logo-btn:hover { opacity: 1; }
  #app-logo-btn.open  { opacity: 1; }
  #app-logo-btn img   { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 6px; }

  .tb-drop-menu {
    display: none; position: fixed; top: var(--topbar-h); left: auto;
    min-width: 180px; background: var(--surface); border: 1px solid var(--divider);
    border-radius: 8px; z-index: 9000; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden; flex-direction: column;
  }
  #app-nav-menu { min-width: 160px; }
  .bl-app-name {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text); white-space: nowrap; flex-shrink: 0;
  }
  @media (max-width: 600px) { .bl-app-name { display: none; } }
  .tb-drop-menu.open { display: flex; }
  .tb-drop-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; font-size: 0.72rem; color: var(--text);
    transition: background 100ms; text-decoration: none; white-space: nowrap;
    background: none; border: none; font-family: inherit; width: 100%; text-align: left;
  }
  .tb-drop-item:hover { background: rgba(0,229,204,0.08); color: var(--teal); }
  .tb-drop-item.active { color: var(--teal); }
  .tb-drop-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tb-drop-divider { height: 1px; background: var(--divider); margin: 4px 0; }

  /* Timing dropdown inner layout */
  #timing-menu { min-width: 200px; padding: 10px 14px; gap: 10px; }
  .timing-row { display: flex; align-items: center; gap: 8px; }
  .timing-lbl { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); width: 60px; }

  /* Kit selector — now a dropdown */
  #kit-selector { display: none; }

  /* Rec trigger — lives above the pad grid in pads view */
  #pads-rec-trigger {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--pink); background: rgba(255,107,157,0.08); border: 1px solid rgba(255,107,157,0.25);
    border-radius: 6px; padding: 6px 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 120ms;
  }
  #pads-rec-trigger:hover { background: rgba(255,107,157,0.18); }
  #pads-rec-trigger.recording { background: var(--pink); color: #fff; border-color: var(--pink); animation: pulse-rec 500ms ease-in-out infinite; }
  @keyframes pulse-rec { 0%,100% { opacity:1; box-shadow: 0 0 10px var(--pink); } 50% { opacity:0.7; box-shadow: none; } }

  /* mode-tab removed — replaced by view dropdown */

  /* ── PATTERNS ─────────────────────────────────────────────── */
  .tb-drop-section-lbl { padding: 6px 14px 3px; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  #patterns-menu { max-height: calc(100vh - var(--topbar-h) - 24px); overflow-y: auto; overflow-x: hidden; }
  #patterns-list { max-height: none; }
  .pattern-row { display: flex; align-items: center; gap: 6px; padding: 7px 14px; cursor: pointer; transition: background 100ms; }
  .pattern-row:hover { background: rgba(0,229,204,0.08); }
  .pattern-row-name { flex: 1; font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pattern-row-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.72rem; padding: 2px 4px; transition: color 120ms; }
  .pattern-row-del:hover { color: var(--pink); }
  #patterns-list-empty { padding: 8px 14px; font-size: 0.68rem; color: var(--muted); }
  #patterns-save-row { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--divider); }
  #patterns-name-input { flex: 1; background: var(--surface-2); border: 1px solid var(--divider); border-radius: 4px; color: var(--text); font-size: 0.72rem; padding: 4px 8px; font-family: inherit; outline: none; }
  #patterns-name-input:focus { border-color: var(--teal); }
  #patterns-save-btn { background: rgba(0,229,204,0.12); border: 1px solid rgba(0,229,204,0.3); border-radius: 4px; color: var(--teal); cursor: pointer; font-size: 0.68rem; letter-spacing: 0.06em; padding: 4px 10px; font-family: inherit; transition: background 120ms; }
  #patterns-save-btn:hover { background: rgba(0,229,204,0.22); }

  /* ── SEQUENCER VIEW ───────────────────────────────────────── */
  #seq-view {
    position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    overflow-y: auto; padding: 16px 12px 60px;
    display: flex; flex-direction: column; gap: 2px;
  }
  #seq-view.hidden { display: none; }

  .beat-num { text-align: center; font-size: 0.5rem; letter-spacing: 0.06em; color: var(--faint); font-variant-numeric: tabular-nums; }
  .beat-num.quarter { color: var(--muted); font-weight: 600; }
  .track { display: flex; align-items: center; }
  .track-label { width: var(--label-w); flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; gap: 3px; padding-right: 4px; }
  .track-label-top { display: flex; align-items: center; gap: 4px; }
  .track-name { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-mute { background: none; border: none; cursor: pointer; color: var(--faint); padding: 2px; transition: color 120ms; flex-shrink: 0; }
  .track-mute:hover { color: var(--teal); }
  .track-mute.muted { color: var(--pink); opacity: 0.7; }

  /* Per-track controls row */
  .track-meta { display: flex; align-items: center; gap: 4px; }
  .track-len-input {
    font-family: inherit; font-size: 0.52rem; color: var(--muted);
    background: none; border: none; border-bottom: 1px solid var(--faint);
    width: 2.4ch; text-align: center; padding: 0; outline: none;
    -moz-appearance: textfield; cursor: pointer;
  }
  .track-len-input:focus { border-bottom-color: var(--teal); color: var(--teal); }
  .track-len-input::-webkit-inner-spin-button,
  .track-len-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .track-len-label { font-size: 0.48rem; letter-spacing: 0.06em; color: var(--faint); }
  .track-euclid-btn {
    font-family: inherit; font-size: 0.48rem; letter-spacing: 0.04em;
    color: var(--faint); background: none; border: none; cursor: pointer;
    padding: 1px 3px; border-radius: 3px; transition: color 120ms, background 120ms;
  }
  .track-euclid-btn:hover { color: var(--amber); background: rgba(245,166,35,0.1); }

  /* Euclidean popover */
  .euclid-pop {
    display: none; position: absolute; z-index: 400;
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 8px; padding: 10px 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    flex-direction: column; gap: 8px; min-width: 140px;
  }
  .euclid-pop.open { display: flex; }
  .euclid-pop-title { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .euclid-row { display: flex; align-items: center; gap: 6px; }
  .euclid-num {
    font-family: inherit; font-size: 0.72rem; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--divider);
    border-radius: 4px; width: 3.2ch; text-align: center; padding: 4px;
    outline: none; -moz-appearance: textfield;
  }
  .euclid-num:focus { border-color: var(--amber); }
  .euclid-num::-webkit-inner-spin-button,
  .euclid-num::-webkit-outer-spin-button { -webkit-appearance: none; }
  .euclid-sep { font-size: 0.7rem; color: var(--muted); }
  .euclid-fill-btn {
    font-family: inherit; font-size: 0.65rem; letter-spacing: 0.06em;
    color: var(--amber); background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3); border-radius: 5px;
    padding: 5px 10px; cursor: pointer; transition: background 120ms; width: 100%;
  }
  .euclid-fill-btn:hover { background: rgba(245,166,35,0.2); }

  /* Steps */
  .steps-row { display: grid; flex: 1; gap: 2px; touch-action: none; }
  .step {
    height: 34px; border-radius: 4px; cursor: pointer;
    border: 1px solid var(--divider); background: var(--surface-2);
    transition: background 80ms, border-color 80ms;
    position: relative; overflow: hidden;
  }
  .step:hover { border-color: color-mix(in srgb, var(--accent, var(--teal)) 50%, transparent); }
  .step.on { background: var(--accent, var(--teal)); border-color: var(--accent, var(--teal)); box-shadow: 0 0 8px color-mix(in srgb, var(--accent, var(--teal)) 50%, transparent); }
  /* probability fill — semi-transparent overlay that dims when prob < 100 */
  .step.on::after { content: ''; position: absolute; inset: 0; background: var(--bg); opacity: 0; transition: opacity 80ms; border-radius: inherit; }
  .step.on[data-prob="75"]::after { opacity: 0.25; }
  .step.on[data-prob="50"]::after { opacity: 0.50; }
  .step.on[data-prob="25"]::after { opacity: 0.68; }
  /* prob label */
  .step.on[data-prob]:not([data-prob="100"])::before {
    content: attr(data-prob) '%';
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 0.44rem; letter-spacing: 0.04em; color: rgba(255,255,255,0.9);
    pointer-events: none; z-index: 1;
  }
  .step.current { border-color: #fff; }
  .step.on.current { background: #fff; border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.5); }
  /* loop-length marker — dim steps beyond a track's own length */
  .step.beyond { opacity: 0.3; }
  .step.beyond.on { opacity: 0.55; }
  .step-gap { width: 4px; height: 34px; }
  @media (pointer: coarse) { .step { height: 40px; border-radius: 6px; background: #1a2830; } }
  .section-label { font-size: 0.52rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); padding: 8px 0 2px var(--label-w); }

  /* ── BEAT ROW ─────────────────────────────────────────────── */
  #beat-row {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; align-items: center; pointer-events: none;
  }
  #beat-row.hidden { display: none; }
  .beat-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--divider); transition: background 60ms; }
  .beat-dot.quarter { width: 7px; height: 7px; }
  .beat-dot.active { background: var(--teal); box-shadow: 0 0 6px var(--teal); }

  /* ── PADS VIEW ────────────────────────────────────────────── */
  #pads-view {
    display: none; position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 16px;
    overflow: hidden;
  }
  #pads-view.active { display: flex; }


  #pad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 12px;
    /* Size to whichever axis is the limiting one, preserving 3:4 aspect ratio */
    width:  min(calc((100vh - var(--topbar-h) - 80px) * 3 / 4), calc(100vw - 32px), 600px);
    height: min(calc(100vh - var(--topbar-h) - 80px), calc((100vw - 32px) * 4 / 3), 800px);
    touch-action: none;
    position: relative;
  }
  #pad-grid.recording { outline: 2px solid var(--pink); outline-offset: 4px; border-radius: 6px; }

  .pad {
    border-radius: 14px; border: 2px solid var(--divider); background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; gap: 5px;
    transition: transform 80ms, background 80ms, border-color 80ms, box-shadow 80ms;
    position: relative; overflow: hidden;
  }
  .pad::after {
    content: ''; position: absolute; inset: 0;
    background: var(--pad-color, var(--teal));
    opacity: 0; border-radius: inherit; transition: opacity 300ms;
  }
  .pad.hit::after { opacity: 0.22; transition: opacity 0ms; }
  .pad.hit {
    transform: scale(0.93); border-color: var(--pad-color, var(--teal));
    box-shadow: 0 0 22px color-mix(in srgb, var(--pad-color, var(--teal)) 45%, transparent);
    transition: transform 80ms, border-color 0ms, box-shadow 0ms;
  }
  .pad-name { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--pad-color, var(--teal)); position: relative; z-index: 1; }
  .pad-sub  { font-size: 0.52rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); position: relative; z-index: 1; }

  /* ── RECORDING SHEET ──────────────────────────────────────── */
  #rec-sheet-backdrop {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.4);
  }
  #rec-sheet-backdrop.open { display: block; }

  #rec-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
    background: var(--surface); border-top: 1px solid var(--divider);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: env(safe-area-inset-bottom, 0);
    max-height: 80vh; overflow-y: auto;
  }
  #rec-sheet.open { transform: translateY(0); }

  #rec-sheet-handle {
    width: 36px; height: 4px; border-radius: 2px; background: var(--divider);
    margin: 12px auto 0;
  }

  #rec-sheet-inner { padding: 16px 20px 24px; }

  .rec-sheet-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .rec-sheet-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); }
  #rec-sheet-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; transition: color 120ms; }
  #rec-sheet-close:hover { color: var(--text); }

  .rec-section { margin-bottom: 16px; }
  .rec-section-label { font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Bar length chips */
  .bar-chips { display: flex; gap: 6px; }
  .bar-chip {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.06em;
    color: var(--muted); background: none; border: 1px solid var(--divider);
    border-radius: 6px; padding: 6px 14px; cursor: pointer; transition: all 120ms; flex: 1; text-align: center;
  }
  .bar-chip:hover { color: var(--text); border-color: var(--muted); }
  .bar-chip.active { color: var(--teal); border-color: var(--teal); background: rgba(0,229,204,0.1); }

  /* Timing options — two clear radio-style choices */
  .timing-options { display: flex; gap: 8px; }
  .timing-opt {
    flex: 1; display: flex; flex-direction: column; gap: 3px;
    background: var(--surface-2); border: 1px solid var(--divider);
    border-radius: 8px; padding: 10px 12px; cursor: pointer; text-align: left;
    transition: border-color 120ms, background 120ms;
    font-family: inherit;
  }
  .timing-opt:hover { border-color: var(--muted); }
  .timing-opt.active { border-color: var(--teal); background: rgba(0,229,204,0.06); }
  .timing-opt-name { font-size: 0.7rem; font-weight: 600; color: var(--muted); transition: color 120ms; }
  .timing-opt.active .timing-opt-name { color: var(--teal); }
  .timing-opt-desc { font-size: 0.6rem; color: var(--faint); line-height: 1.3; transition: color 120ms; }
  .timing-opt.active .timing-opt-desc { color: var(--muted); }

  /* Record button in sheet */
  #rec-start-btn {
    width: 100%; font-family: inherit; font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--pink); background: rgba(255,107,157,0.1);
    border: 1px solid rgba(255,107,157,0.35); border-radius: 10px;
    padding: 14px; cursor: pointer; margin-top: 4px; transition: background 120ms;
  }
  #rec-start-btn:hover { background: rgba(255,107,157,0.2); }

  /* Floating count-in pill — overlays the pads without blocking them */
  #rec-countdown-pill {
    visibility: hidden; pointer-events: none;
    background: rgba(8,12,16,0.88); backdrop-filter: blur(12px);
    border: 1px solid var(--amber); border-radius: 999px;
    padding: 6px 18px; white-space: nowrap;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; color: var(--amber);
    animation: pill-pulse 500ms ease-in-out infinite;
  }
  #rec-countdown-pill.visible { visibility: visible; }
  @keyframes pill-pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
  #rec-countdown-pill.go { color: var(--pink); border-color: var(--pink); animation: none; }

  /* Save state */
  #rec-save-state { display: none; }
  #rec-save-state.visible { display: block; }
  .rec-save-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #takes-name-input {
    flex: 1; background: var(--surface-2); border: 1px solid var(--divider); border-radius: 6px;
    color: var(--text); font-size: 0.8rem; padding: 8px 12px; font-family: inherit; outline: none;
    transition: border-color 120ms;
  }
  #takes-name-input:focus { border-color: var(--purple); }
  #takes-save-btn {
    background: rgba(176,111,255,0.12); border: 1px solid rgba(176,111,255,0.3);
    border-radius: 6px; color: var(--purple); cursor: pointer; font-size: 0.7rem;
    letter-spacing: 0.06em; padding: 8px 14px; font-family: inherit; white-space: nowrap; transition: background 120ms;
  }
  #takes-save-btn:hover { background: rgba(176,111,255,0.22); }

  /* Takes list */
  #takes-list { max-height: 160px; overflow-y: auto; }
  #takes-list-empty { font-size: 0.68rem; color: var(--muted); padding: 4px 0; }
  .take-row { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--divider); }
  .take-row:last-child { border-bottom: none; }
  .take-row-name { flex: 1; font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .take-row-play:hover { color: var(--green); border-color: var(--green); }

</style>

<script type="module">
import { makeImpulse, makePinkNoise, makeWhiteNoise } from '../core/audio.js';
import { savePattern, loadPattern, listPatterns, deletePattern, getVolume, setVolume } from '../core/storage.js';

(() => {
  'use strict';

  const APP_ID    = 'drums';
  const REC_ID    = 'drums:rec';
  const LOOKAHEAD = 0.1;
  const TICK_MS   = 25;

  const STEPS_PER_BEAT = 4; // 16th-note resolution — never changes
  let BEATS_PER_BAR = 4;
  let STEPS = BEATS_PER_BAR * STEPS_PER_BEAT; // 16
  let bpm   = 120;
  let mode  = 'seq';
  function stepDuration() { return 60 / bpm / STEPS_PER_BEAT; }
  function beatDuration()  { return 60 / bpm; }

  /* ── TRACKS ───────────────────────────────────────────────── */
  const TRACKS = [
    { id:'kick',    name:'Kick',     sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'snare',   name:'Snare',    sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'clap',    name:'Clap',     sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'hihat',   name:'Hi-Hat',   sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'openhat', name:'Open Hat', sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'crash',   name:'Crash',    sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'tomhi',   name:'Tom Hi',   sub:'tom',    section:'Drums', color:'var(--amber)'  },
    { id:'tomlo',   name:'Tom Lo',   sub:'tom',    section:'Drums', color:'var(--amber)'  },
    { id:'rim',     name:'Rim',      sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'shaker',  name:'Shaker',   sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'cowbell', name:'Cowbell',  sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'clave',   name:'Clave',    sub:'perc',   section:'Perc',  color:'var(--pink)'   },
  ];

  let dirty = false; // true if unsaved changes exist since last load/save/reset

  const state = {};
  // steps: array of {on: bool, prob: 100|75|50|25}
  // trackLen: how many steps this track loops over (0 = follow global STEPS)
  // trackPos: per-track playhead
  TRACKS.forEach(t => {
    state[t.id] = {
      steps: Array(32).fill(null).map(() => ({ on: false, prob: 100 })),
      muted: false,
      trackLen: 0,
      trackPos: 0,
    };
  });

  /* ── KITS ─────────────────────────────────────────────────── */
  const KITS = {
    '808': {
      kick:    { startFreq:150, endFreq:40,  decay:0.45, gain:1.8  },
      snare:   { bodyFreq:220,  bodyDecay:0.12, noiseHp:2000, noiseDecay:0.18, noiseGain:1.2 },
      clap:    { hp:1600, decay:0.07, gain:0.9  },
      hihat:   { hp:7000, decay:0.06, gain:1.4  },
      openhat: { hp:7000, decay:0.35, gain:1.2  },
      crash:   { hp:3000, bp:8000,  decay:1.4,  gain:1.0  },
      tomhi:   { startFreq:200, endFreq:80,  decay:0.30, gain:1.3  },
      tomlo:   { startFreq:100, endFreq:45,  decay:0.45, gain:1.5  },
      rim:     { freq:400,  decay:0.04, gain:0.6  },
      shaker:  { hp:8000,  decay:0.05, gain:0.6  },
      cowbell: { freq1:540, freq2:840, decay:0.40, gain:0.8  },
      clave:   { freq:2400, decay:0.025,gain:1.0  },
    },
    'acoustic': {
      kick:    { startFreq:100, endFreq:50,  decay:0.55, gain:1.6  },
      snare:   { bodyFreq:180,  bodyDecay:0.15, noiseHp:1500, noiseDecay:0.24, noiseGain:1.0 },
      clap:    { hp:1200, decay:0.10, gain:0.8  },
      hihat:   { hp:8000, decay:0.04, gain:1.2  },
      openhat: { hp:6000, decay:0.50, gain:1.0  },
      crash:   { hp:2500, bp:6000,  decay:2.0,  gain:0.9  },
      tomhi:   { startFreq:250, endFreq:100, decay:0.25, gain:1.2  },
      tomlo:   { startFreq:130, endFreq:55,  decay:0.40, gain:1.4  },
      rim:     { freq:600,  decay:0.03, gain:0.7  },
      shaker:  { hp:7000,  decay:0.08, gain:0.5  },
      cowbell: { freq1:560, freq2:880, decay:0.30, gain:0.7  },
      clave:   { freq:2800, decay:0.02, gain:0.9  },
    },
    'lo-fi': {
      kick:    { startFreq:120, endFreq:35,  decay:0.60, gain:2.0  },
      snare:   { bodyFreq:200,  bodyDecay:0.10, noiseHp:1800, noiseDecay:0.28, noiseGain:1.4 },
      clap:    { hp:1400, decay:0.09, gain:1.0  },
      hihat:   { hp:6000, decay:0.08, gain:1.0  },
      openhat: { hp:5500, decay:0.40, gain:0.9  },
      crash:   { hp:2000, bp:5000,  decay:1.8,  gain:0.8  },
      tomhi:   { startFreq:180, endFreq:70,  decay:0.35, gain:1.2  },
      tomlo:   { startFreq:90,  endFreq:40,  decay:0.50, gain:1.6  },
      rim:     { freq:350,  decay:0.05, gain:0.7  },
      shaker:  { hp:7500,  decay:0.07, gain:0.7  },
      cowbell: { freq1:500, freq2:780, decay:0.50, gain:0.9  },
      clave:   { freq:2200, decay:0.03, gain:1.1  },
    },
    'electronic': {
      kick:    { startFreq:200, endFreq:30,  decay:0.30, gain:2.2  },
      snare:   { bodyFreq:300,  bodyDecay:0.08, noiseHp:3000, noiseDecay:0.12, noiseGain:1.5 },
      clap:    { hp:2000, decay:0.05, gain:1.2  },
      hihat:   { hp:9000, decay:0.03, gain:1.6  },
      openhat: { hp:8000, decay:0.25, gain:1.4  },
      crash:   { hp:4000, bp:10000, decay:1.0,  gain:1.2  },
      tomhi:   { startFreq:300, endFreq:100, decay:0.20, gain:1.5  },
      tomlo:   { startFreq:150, endFreq:40,  decay:0.35, gain:1.8  },
      rim:     { freq:500,  decay:0.03, gain:0.8  },
      shaker:  { hp:9000,  decay:0.04, gain:0.8  },
      cowbell: { freq1:580, freq2:920, decay:0.25, gain:1.0  },
      clave:   { freq:3000, decay:0.02, gain:1.2  },
    },
  };

  let currentKit = '808';

  /* ── AUDIO ENGINE ─────────────────────────────────────────── */
  let ctx, masterGain, compressor, reverbConvolver, reverbReturn;
  let pinkBuf, whiteBuf;

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume(); // iOS requires resume() in the same gesture frame as creation
    masterGain = ctx.createGain();
    masterGain.gain.value = getVolume(0.5);
    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18; compressor.ratio.value = 4;
    masterGain.connect(compressor); compressor.connect(ctx.destination);
    reverbConvolver = ctx.createConvolver();
    reverbReturn = ctx.createGain(); reverbReturn.gain.value = 0.75;
    reverbConvolver.connect(reverbReturn); reverbReturn.connect(masterGain);
    // Defer heavy buffer generation so initAudio() returns fast inside the gesture handler
    setTimeout(() => {
      reverbConvolver.buffer = makeImpulse(ctx, 2.2, 2.5);
      pinkBuf  = makePinkNoise(ctx, 2);
      whiteBuf = makeWhiteNoise(ctx, 2);
    }, 0);
  }

  function reverbSend(g, amt) {
    const s = ctx.createGain(); s.gain.value = amt ?? 0.15;
    g.connect(s); s.connect(reverbConvolver);
  }

  /* ── VOICES ───────────────────────────────────────────────── */
  function voiceKick(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.startFreq, time);
    osc.frequency.exponentialRampToValueAtTime(p.endFreq, time + 0.08);
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.05);
  }
  function voiceSnare(time, p) {
    const body = ctx.createOscillator(), bg = ctx.createGain();
    body.type = 'triangle';
    body.frequency.setValueAtTime(p.bodyFreq, time);
    body.frequency.exponentialRampToValueAtTime(p.bodyFreq * 0.45, time + 0.06);
    bg.gain.setValueAtTime(1.0, time); bg.gain.exponentialRampToValueAtTime(0.001, time + p.bodyDecay);
    body.connect(bg); bg.connect(masterGain);
    body.start(time); body.stop(time + p.bodyDecay + 0.03);
    if (!pinkBuf) return;
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), ng = ctx.createGain();
    ns.buffer = pinkBuf; hp.type = 'highpass'; hp.frequency.value = p.noiseHp;
    ng.gain.setValueAtTime(p.noiseGain, time); ng.gain.exponentialRampToValueAtTime(0.001, time + p.noiseDecay);
    ns.connect(hp); hp.connect(ng); ng.connect(masterGain); reverbSend(ng, 0.12);
    ns.start(time); ns.stop(time + p.noiseDecay + 0.02);
  }
  function voiceClap(time, p) {
    if (!pinkBuf) return;
    [0, 0.008, 0.018].forEach(offset => {
      const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
      ns.buffer = pinkBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
      g.gain.setValueAtTime(p.gain, time + offset); g.gain.exponentialRampToValueAtTime(0.001, time + offset + p.decay);
      ns.connect(hp); hp.connect(g); g.connect(masterGain); reverbSend(g, 0.18);
      ns.start(time + offset); ns.stop(time + offset + p.decay + 0.02);
    });
  }
  function voiceHihat(time, p) {
    if (!whiteBuf) return;
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain);
    ns.start(time); ns.stop(time + p.decay + 0.02);
  }
  function voiceOpenhat(time, p) {
    if (!whiteBuf) return;
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain); reverbSend(g, 0.1);
    ns.start(time); ns.stop(time + p.decay + 0.03);
  }
  function voiceCrash(time, p) {
    if (!whiteBuf) return;
    const ns = ctx.createBufferSource(); ns.buffer = whiteBuf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = p.hp;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.bp; bp.Q.value = 0.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(masterGain); reverbSend(g, 0.25);
    ns.start(time); ns.stop(time + p.decay + 0.1);
  }
  function voiceTom(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.startFreq, time);
    osc.frequency.exponentialRampToValueAtTime(p.endFreq, time + p.decay * 0.4);
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.05);
  }
  function voiceRim(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'square'; osc.frequency.value = p.freq;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.01);
  }
  function voiceShaker(time, p) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain);
    ns.start(time); ns.stop(time + p.decay + 0.01);
  }
  function voiceCowbell(time, p) {
    const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), g = ctx.createGain();
    osc1.type = 'square'; osc1.frequency.value = p.freq1;
    osc2.type = 'square'; osc2.frequency.value = p.freq2;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc1.connect(g); osc2.connect(g); g.connect(masterGain); reverbSend(g, 0.1);
    osc1.start(time); osc1.stop(time + p.decay + 0.05);
    osc2.start(time); osc2.stop(time + p.decay + 0.05);
  }
  function voiceClave(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = p.freq;
    g.gain.setValueAtTime(p.gain, time); g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.01);
  }

  function voice(id, time) {
    const p = KITS[currentKit][id];
    switch (id) {
      case 'kick':    voiceKick(time, p);    break;
      case 'snare':   voiceSnare(time, p);   break;
      case 'clap':    voiceClap(time, p);    break;
      case 'hihat':   voiceHihat(time, p);   break;
      case 'openhat': voiceOpenhat(time, p); break;
      case 'crash':   voiceCrash(time, p);   break;
      case 'tomhi':   voiceTom(time, p);     break;
      case 'tomlo':   voiceTom(time, p);     break;
      case 'rim':     voiceRim(time, p);     break;
      case 'shaker':  voiceShaker(time, p);  break;
      case 'cowbell': voiceCowbell(time, p); break;
      case 'clave':   voiceClave(time, p);   break;
    }
  }

  /* ── SCHEDULER ────────────────────────────────────────────── */
  let playing = false, currentStep = 0, nextBeatTime = 0, tickTimer = null;

  function scheduleStep(globalStep, time) {
    TRACKS.forEach(t => {
      const ts = state[t.id];
      if (ts.muted) return;
      const len = ts.trackLen || STEPS;
      const s = ts.trackPos % len;
      const cell = ts.steps[s];
      if (cell && cell.on && Math.random() * 100 < cell.prob) voice(t.id, time);
      ts.trackPos = (s + 1) % len;
    });
    const msUntil = Math.max(0, (time - ctx.currentTime) * 1000);
    setTimeout(() => updatePlayhead(globalStep), msUntil);
  }

  function tick() {
    while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
      scheduleStep(currentStep, nextBeatTime);
      nextBeatTime += stepDuration();
      currentStep = (currentStep + 1) % STEPS;
    }
    tickLiveLoop(ctx.currentTime);
  }

  /* ── LIVE LOOP ────────────────────────────────────────────── */
  let liveLoop = null; // { take, loopStart, scheduledThrough }
  let liveLoopTimer = null;

  function startLiveLoop(take, name) {
    if (!ctx) initAudio();
    ctx.resume();
    stopLiveLoop();
    liveLoop = {
      take, _name: name || '',
      loopStart: ctx.currentTime + 0.05,
      scheduledThrough: ctx.currentTime,
    };
    if (!liveLoopTimer) liveLoopTimer = setInterval(() => tickLiveLoop(ctx.currentTime), TICK_MS);
    renderTakesList();
  }

  function stopLiveLoop() {
    liveLoop = null;
    clearInterval(liveLoopTimer); liveLoopTimer = null;
    renderTakesList();
  }

  function tickLiveLoop(now) {
    if (!liveLoop) return;
    const { take } = liveLoop;
    const loopDur = take.bars * 4 * beatDuration();
    const horizon = now + LOOKAHEAD;
    take.events.forEach(ev => {
      const beatSec = ev.beat * beatDuration();
      const firstCycle = Math.max(0, Math.floor((liveLoop.scheduledThrough - liveLoop.loopStart) / loopDur));
      const lastCycle  = Math.ceil((horizon - liveLoop.loopStart) / loopDur);
      for (let c = firstCycle; c < lastCycle; c++) {
        const t = liveLoop.loopStart + c * loopDur + beatSec;
        if (t >= liveLoop.scheduledThrough && t < horizon) {
          voice(ev.id, t);
          const pad = document.querySelector(`.pad[data-track-id="${ev.id}"]`);
          if (pad) {
            const delay = Math.max(0, (t - ctx.currentTime) * 1000);
            setTimeout(() => { pad.classList.add('hit'); setTimeout(() => pad.classList.remove('hit'), 80); }, delay);
          }
        }
      }
    });
    liveLoop.scheduledThrough = horizon;
  }

  function startTransport() {
    if (!ctx) initAudio();
    ctx.resume();
    playing = true; currentStep = 0; nextBeatTime = ctx.currentTime + 0.05;
    TRACKS.forEach(t => { state[t.id].trackPos = 0; });
    tickTimer = setInterval(tick, TICK_MS);
    document.getElementById('play-btn').textContent = '◼ Stop';
    document.getElementById('play-btn').classList.add('playing');
  }

  function stopTransport() {
    playing = false; clearInterval(tickTimer); clearPlayhead();
    document.getElementById('play-btn').textContent = '▶ Play';
    document.getElementById('play-btn').classList.remove('playing');
  }

  function toggleTransport() { playing ? stopTransport() : startTransport(); }

  /* ── PLAYHEAD ─────────────────────────────────────────────── */
  let lastStep = -1;

  function updatePlayhead(step) {
    if (lastStep >= 0) {
      document.querySelectorAll(`.step[data-step="${lastStep}"]`).forEach(el => el.classList.remove('current'));
      const prev = document.querySelectorAll('.beat-dot')[lastStep];
      if (prev) prev.classList.remove('active');
    }
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    const dot = document.querySelectorAll('.beat-dot')[step];
    if (dot) dot.classList.add('active');
    lastStep = step;
  }

  function clearPlayhead() {
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll('.beat-dot.active').forEach(el => el.classList.remove('active'));
    lastStep = -1;
  }

  /* ── SEQUENCER GRID ───────────────────────────────────────── */
  const gridColsStyle = () => `repeat(${STEPS + Math.floor(STEPS / STEPS_PER_BEAT) - 1}, 1fr)`;

  function buildGrid() {
    const view = document.getElementById('seq-view');
    view.innerHTML = '';
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;margin-bottom:4px;';
    const spacer = document.createElement('div');
    spacer.style.cssText = `width:var(--label-w);flex-shrink:0;`;
    header.appendChild(spacer);
    const nums = document.createElement('div');
    nums.style.cssText = `display:grid;flex:1;grid-template-columns:${gridColsStyle()};gap:2px;`;
    for (let i = 0; i < STEPS; i++) {
      if (i > 0 && i % STEPS_PER_BEAT === 0) { const gap = document.createElement('div'); gap.style.width = '4px'; nums.appendChild(gap); }
      const n = document.createElement('div');
      n.className = 'beat-num' + (i % STEPS_PER_BEAT === 0 ? ' quarter' : '');
      n.textContent = i % STEPS_PER_BEAT === 0 ? String(Math.floor(i / STEPS_PER_BEAT) + 1) : '·';
      nums.appendChild(n);
    }
    header.appendChild(nums); view.appendChild(header);

    let lastSection = null;
    TRACKS.forEach(track => {
      if (track.section !== lastSection) {
        const lbl = document.createElement('div');
        lbl.className = 'section-label'; lbl.textContent = track.section;
        view.appendChild(lbl); lastSection = track.section;
      }
      view.appendChild(buildTrackRow(track));
    });
  }

  // Global drag state — shared across all rows so vertical drag works
  let seqDragIntent = null;
  let holdTimer = null;
  function initSeqDrag() {
    const view = document.getElementById('seq-view');

    // Close euclidean popovers when clicking outside
    view.addEventListener('pointerdown', e => {
      if (openEuclidPop && !e.target.closest('.euclid-pop') && !e.target.closest('.track-euclid-btn')) {
        openEuclidPop.classList.remove('open');
        openEuclidPop = null;
      }
    }, { capture: true });
    document.addEventListener('pointerdown', e => {
      if (openEuclidPop && !e.target.closest('.euclid-pop') && !e.target.closest('.track-euclid-btn')) {
        openEuclidPop.classList.remove('open');
        openEuclidPop = null;
      }
    }, { capture: true });

    view.addEventListener('pointerdown', e => {
      const btn = e.target.closest('.step'); if (!btn) return;
      if (btn.classList.contains('beyond')) return; // grey zone is read-only
      e.preventDefault();
      const ts = state[btn.dataset.trackId]; if (!ts) return;
      const s = parseInt(btn.dataset.step, 10);
      const cell = ts.steps[s];
      // Right-click or long-press on an active step cycles probability
      if (e.button === 2 || e.pointerType === 'touch') {
        if (cell.on) {
          holdTimer = setTimeout(() => {
            holdTimer = null;
            cycleProbability(ts, btn, s);
            seqDragIntent = null; // prevent drag after long press
          }, 400);
        }
      }
      seqDragIntent = cell.on ? 'off' : 'on';
      applyStep(ts, btn, s, seqDragIntent);
      view.setPointerCapture(e.pointerId);
    });
    view.addEventListener('contextmenu', e => {
      const btn = e.target.closest('.step'); if (!btn) return;
      e.preventDefault();
      const ts = state[btn.dataset.trackId]; if (!ts) return;
      cycleProbability(ts, btn, parseInt(btn.dataset.step, 10));
      seqDragIntent = null;
    });
    view.addEventListener('pointermove', e => {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      if (seqDragIntent === null) return;
      e.preventDefault();
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.step');
      if (!target) return;
      const ts = state[target.dataset.trackId]; if (!ts) return;
      applyStep(ts, target, parseInt(target.dataset.step, 10), seqDragIntent);
    }, { passive: false });
    view.addEventListener('pointerup', () => {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      seqDragIntent = null;
    });
    view.addEventListener('pointercancel', () => {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      seqDragIntent = null;
    });
  }

  /* ── Euclidean (Bjorklund) ────────────────────────────────── */
  function euclidean(hits, steps) {
    if (hits <= 0) return Array(steps).fill(false);
    hits = Math.min(hits, steps);
    // Bjorklund: step s gets a hit if floor(s*hits/steps) != floor((s-1)*hits/steps)
    return Array.from({ length: steps }, (_, s) =>
      Math.floor(s * hits / steps) !== Math.floor((s - 1) * hits / steps)
    );
  }

  let openEuclidPop = null;

  function buildTrackRow(track) {
    const ts = state[track.id];
    const row = document.createElement('div');
    row.className = 'track'; row.dataset.trackId = track.id; row.style.position = 'relative';

    /* ── Label column ─────────────────────────────────────── */
    const label = document.createElement('div'); label.className = 'track-label';

    const top = document.createElement('div'); top.className = 'track-label-top';
    const nameEl = document.createElement('span'); nameEl.className = 'track-name';
    nameEl.textContent = track.name; nameEl.style.color = track.color;
    const muteBtn = document.createElement('button');
    muteBtn.className = 'track-mute' + (ts.muted ? ' muted' : '');
    muteBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path class="mx" d="M23 9 17 15M17 9 23 15" style="${ts.muted?'':'display:none'}"/>
      <path class="vw" d="M15.54 8.46a5 5 0 0 1 0 7.07" style="${ts.muted?'display:none':''}"/>
    </svg>`;
    muteBtn.addEventListener('click', () => {
      ts.muted = !ts.muted;
      muteBtn.classList.toggle('muted', ts.muted);
      muteBtn.querySelector('.mx').style.display = ts.muted ? '' : 'none';
      muteBtn.querySelector('.vw').style.display = ts.muted ? 'none' : '';
      dirty = true;
    });
    top.appendChild(nameEl); top.appendChild(muteBtn); label.appendChild(top);

    /* Per-track length + Euclidean button */
    const meta = document.createElement('div'); meta.className = 'track-meta';

    const lenInput = document.createElement('input');
    lenInput.type = 'number'; lenInput.className = 'track-len-input';
    lenInput.min = 1; lenInput.max = 32;
    lenInput.value = ts.trackLen || STEPS;
    lenInput.title = 'Loop length for this track';
    lenInput.addEventListener('change', () => {
      const v = Math.max(1, Math.min(32, parseInt(lenInput.value, 10) || STEPS));
      lenInput.value = v;
      ts.trackLen = v === STEPS ? 0 : v;
      dirty = true;
      // Redraw beyond markers
      row.querySelectorAll('.step').forEach(btn => {
        const s = parseInt(btn.dataset.step, 10);
        btn.classList.toggle('beyond', s >= (ts.trackLen || STEPS));
      });
    });
    lenInput.addEventListener('keydown', e => { if (e.key === 'Enter') lenInput.blur(); });

    const lenLbl = document.createElement('span'); lenLbl.className = 'track-len-label'; lenLbl.textContent = 'steps';

    const eucBtn = document.createElement('button'); eucBtn.className = 'track-euclid-btn'; eucBtn.textContent = 'E';
    eucBtn.title = 'Euclidean fill';

    /* Euclidean popover */
    const pop = document.createElement('div'); pop.className = 'euclid-pop';
    const popTitle = document.createElement('div'); popTitle.className = 'euclid-pop-title'; popTitle.textContent = 'Euclidean fill';
    const eucRow = document.createElement('div'); eucRow.className = 'euclid-row';
    const hitsIn = document.createElement('input'); hitsIn.type = 'number'; hitsIn.className = 'euclid-num'; hitsIn.min = 0; hitsIn.max = 32; hitsIn.value = 4; hitsIn.placeholder = 'hits';
    const sep = document.createElement('span'); sep.className = 'euclid-sep'; sep.textContent = 'in';
    const stepsIn = document.createElement('input'); stepsIn.type = 'number'; stepsIn.className = 'euclid-num'; stepsIn.min = 1; stepsIn.max = 32; stepsIn.value = ts.trackLen || STEPS; stepsIn.placeholder = 'steps';
    eucRow.appendChild(hitsIn); eucRow.appendChild(sep); eucRow.appendChild(stepsIn);
    const fillBtn = document.createElement('button'); fillBtn.className = 'euclid-fill-btn'; fillBtn.textContent = 'Fill';
    fillBtn.addEventListener('click', () => {
      const h = Math.max(0, Math.min(32, parseInt(hitsIn.value, 10) || 0));
      const st = Math.max(1, Math.min(32, parseInt(stepsIn.value, 10) || STEPS));
      const pattern = euclidean(h, st);
      // Apply to track state
      ts.steps.forEach((c, i) => { c.on = i < st ? pattern[i] : false; });
      // Update step length to match
      ts.trackLen = st === STEPS ? 0 : st;
      lenInput.value = st;
      dirty = true;
      // Rebuild the step buttons visually
      rebuildStepButtons(row, track);
      pop.classList.remove('open');
      openEuclidPop = null;
    });
    pop.appendChild(popTitle); pop.appendChild(eucRow); pop.appendChild(fillBtn);
    row.appendChild(pop);

    eucBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (openEuclidPop && openEuclidPop !== pop) openEuclidPop.classList.remove('open');
      pop.classList.toggle('open');
      openEuclidPop = pop.classList.contains('open') ? pop : null;
      if (pop.classList.contains('open')) {
        stepsIn.value = ts.trackLen || STEPS;
        // Position below the button
        const rect = eucBtn.getBoundingClientRect();
        const rowRect = row.getBoundingClientRect();
        pop.style.top = (rect.bottom - rowRect.top + 4) + 'px';
        pop.style.left = '0px';
      }
    });

    meta.appendChild(lenInput); meta.appendChild(lenLbl); meta.appendChild(eucBtn);
    label.appendChild(meta); row.appendChild(label);

    /* ── Step grid ────────────────────────────────────────── */
    const grid = document.createElement('div');
    grid.className = 'steps-row';
    grid.style.gridTemplateColumns = gridColsStyle();
    grid.style.setProperty('--accent', track.color);
    grid.dataset.trackStepsGrid = track.id;
    buildStepButtons(grid, track, ts);
    row.appendChild(grid);
    return row;
  }

  function buildStepButtons(grid, track, ts) {
    grid.innerHTML = '';
    const len = ts.trackLen || STEPS;
    for (let s = 0; s < STEPS; s++) {
      if (s > 0 && s % STEPS_PER_BEAT === 0) { const gap = document.createElement('div'); gap.className = 'step-gap'; grid.appendChild(gap); }
      // For steps in the grey "beyond" zone, show what will actually play (the loop repeat)
      const cell = ts.steps[s % len] || { on: false, prob: 100 };
      const btn = document.createElement('div');
      btn.className = 'step' + (cell.on ? ' on' : '') + (s >= len ? ' beyond' : '');
      btn.dataset.trackId = track.id; btn.dataset.step = s;
      if (cell.on && cell.prob < 100) btn.dataset.prob = cell.prob;
      grid.appendChild(btn);
    }
  }

  function rebuildStepButtons(row, track) {
    const ts = state[track.id];
    const grid = row.querySelector('[data-track-steps-grid]');
    if (grid) buildStepButtons(grid, track, ts);
    // also update len input
    const li = row.querySelector('.track-len-input');
    if (li) li.value = ts.trackLen || STEPS;
  }

  function applyStep(ts, btn, step, intent) {
    const on = intent === 'on';
    const cell = ts.steps[step];
    if (cell.on === on) return;
    cell.on = on;
    if (on) { cell.prob = 100; delete btn.dataset.prob; }
    btn.classList.toggle('on', on);
    dirty = true;
  }

  function cycleProbability(ts, btn, step) {
    const cell = ts.steps[step];
    if (!cell.on) return;
    const cycle = [100, 75, 50, 25];
    const idx = cycle.indexOf(cell.prob);
    const next = cycle[(idx + 1) % cycle.length];
    if (next === 100) {
      delete btn.dataset.prob;
    } else {
      btn.dataset.prob = next;
    }
    cell.prob = next;
    dirty = true;
  }

  /* ── BEAT ROW ─────────────────────────────────────────────── */
  function rebuildBeatRow() {
    const beatRow = document.getElementById('beat-row');
    beatRow.innerHTML = '';
    for (let i = 0; i < STEPS; i++) {
      const dot = document.createElement('div');
      dot.className = 'beat-dot' + (i % STEPS_PER_BEAT === 0 ? ' quarter' : '');
      beatRow.appendChild(dot);
    }
  }

  function syncKitUI() {
    const menu = document.getElementById('kit-menu');
    const dropBtn = document.getElementById('kit-drop-btn');
    if (menu) menu.querySelectorAll('.tb-drop-item').forEach(b => b.classList.toggle('active', b.textContent === currentKit));
    if (dropBtn) {
      const txt = Array.from(dropBtn.childNodes).find(n => n.nodeType === 3 && n.textContent.trim());
      if (txt) txt.textContent = currentKit;
    }
  }

  /* ── PADS VIEW ────────────────────────────────────────────── */
  function buildKitSelector() {
    const menu = document.getElementById('kit-menu');
    const dropBtn = document.getElementById('kit-drop-btn');
    menu.innerHTML = '';
    Object.keys(KITS).forEach(kit => {
      const btn = document.createElement('button');
      btn.className = 'tb-drop-item' + (kit === currentKit ? ' active' : '');
      btn.textContent = kit;
      btn.addEventListener('click', () => {
        currentKit = kit;
        localStorage.setItem('beatlab:drums:kit', kit);
        syncKitUI();
        dirty = true;
        closeAllDrops();
      });
      menu.appendChild(btn);
    });
    syncKitUI();
  }

  function firePad(id, padEl) {
    if (!ctx) initAudio();
    ctx.resume();
    voice(id, ctx.currentTime + 0.01);
    if (recActive) {
      const beat = (ctx.currentTime - recStartTime) / beatDuration();
      recEvents.push({ id, beat });
    }
    padEl.classList.add('hit');
    setTimeout(() => padEl.classList.remove('hit'), 80);
  }

  function buildPads() {
    const grid = document.getElementById('pad-grid');
    grid.innerHTML = '';
    TRACKS.forEach(track => {
      const pad = document.createElement('div');
      pad.className = 'pad';
      pad.dataset.trackId = track.id;
      pad.style.setProperty('--pad-color', track.color);
      const name = document.createElement('span'); name.className = 'pad-name'; name.textContent = track.name;
      const sub  = document.createElement('span'); sub.className  = 'pad-sub';  sub.textContent  = track.sub;
      pad.appendChild(name); pad.appendChild(sub);
      grid.appendChild(pad);
    });

    let swipeActive = false, lastSwipedId = null;
    grid.addEventListener('pointerdown', e => {
      const pad = e.target.closest('.pad'); if (!pad) return;
      e.preventDefault();
      swipeActive = true; lastSwipedId = pad.dataset.trackId;
      firePad(pad.dataset.trackId, pad);
    });
    grid.addEventListener('pointermove', e => {
      if (!swipeActive) return;
      e.preventDefault();
      const el = document.elementFromPoint(e.clientX, e.clientY)?.closest('.pad');
      if (!el || el.dataset.trackId === lastSwipedId) return;
      lastSwipedId = el.dataset.trackId;
      firePad(el.dataset.trackId, el);
    }, { passive: false });
    grid.addEventListener('pointerup',     () => { swipeActive = false; lastSwipedId = null; });
    grid.addEventListener('pointercancel', () => { swipeActive = false; lastSwipedId = null; });
  }

  /* ── RECORDING SHEET ──────────────────────────────────────── */
  const recSheet     = document.getElementById('rec-sheet');
  const recBackdrop  = document.getElementById('rec-sheet-backdrop');
  const recSetup     = document.getElementById('rec-setup');
  const recSaveState = document.getElementById('rec-save-state');
  const recTrigger   = document.getElementById('pads-rec-trigger');
  const countdownPill = document.getElementById('rec-countdown-pill');

  document.getElementById('pending-play-btn').addEventListener('click', () => {
    if (!pendingTake) return;
    const btn = document.getElementById('pending-play-btn');
    if (liveLoop && liveLoop._name === '__pending__') {
      stopLiveLoop();
      btn.textContent = '▶'; btn.classList.remove('active');
      return;
    }
    startLiveLoop(pendingTake, '__pending__');
    btn.textContent = '◼'; btn.classList.add('active');
    closeRecSheet(true);
  });
  document.getElementById('pending-seq-btn').addEventListener('click', () => {
    if (!pendingTake) { return; }
    applyTake(pendingTake);
    closeRecSheet(true);
  });

  function openRecSheet() {
    recSheet.classList.add('open');
    recBackdrop.classList.add('open');
    showSetupState();
  }

  function closeRecSheet(force = false) {
    if (recActive) stopRecording();
    // Don't dismiss on backdrop tap if there's an unsaved pending take
    if (!force && pendingTake) return;
    pendingTake = null;
    recSheet.classList.remove('open');
    recBackdrop.classList.remove('open');
  }

  function showSetupState() {
    document.getElementById('rec-sheet-title').textContent = 'Record a take';
    recSetup.style.display = '';
    recSaveState.classList.remove('visible');
  }

  function showSaveState() {
    document.getElementById('rec-sheet-title').textContent = 'Take recorded';
    recSetup.style.display = 'none';
    recSaveState.classList.add('visible');
    const ppb = document.getElementById('pending-play-btn');
    ppb.textContent = '▶'; ppb.classList.remove('active');
    renderTakesList();
    document.getElementById('takes-name-input').focus();
  }

  recBackdrop.addEventListener('click', () => closeRecSheet(false));
  document.getElementById('rec-sheet-close').addEventListener('click', () => closeRecSheet(true));
  recTrigger.addEventListener('click', () => {
    if (recActive) { stopRecording(); return; }
    openRecSheet();
  });

  /* Bar length chips */
  let recBars = 1;
  document.querySelectorAll('.bar-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      recBars = parseInt(chip.dataset.bars, 10);
      document.querySelectorAll('.bar-chip').forEach(c => c.classList.toggle('active', c === chip));
    });
  });

  /* Timing options */
  let recQuantize = false;
  document.querySelectorAll('.timing-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      recQuantize = opt.dataset.quantize === 'true';
      document.querySelectorAll('.timing-opt').forEach(o => o.classList.toggle('active', o === opt));
    });
  });

  /* ── METRONOME ────────────────────────────────────────────── */
  function scheduleClick(time, isDownbeat) {
    if (!ctx) return;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.frequency.value = isDownbeat ? 1000 : 800;
    g.gain.setValueAtTime(0.35, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + 0.04);
  }

  /* ── RECORDING ────────────────────────────────────────────── */
  let recActive = false, recStartTime = 0, recEvents = [], pendingTake = null, recTimer = null;

  document.getElementById('rec-start-btn').addEventListener('click', startCountIn);

  function startCountIn() {
    if (!ctx) initAudio();
    ctx.resume();

    // Close sheet immediately so pads are visible and tappable
    recSheet.classList.remove('open');
    recBackdrop.classList.remove('open');

    const now = ctx.currentTime + 0.1;
    for (let i = 0; i < 4; i++) scheduleClick(now + i * beatDuration(), i === 0);

    let n = 4;
    countdownPill.textContent = n;
    countdownPill.className = 'visible';

    const iv = setInterval(() => {
      n--;
      if (n <= 0) {
        clearInterval(iv);
        countdownPill.textContent = '● REC';
        countdownPill.className = 'visible go';
        beginRecording(now + 4 * beatDuration());
      } else {
        countdownPill.textContent = n;
      }
    }, beatDuration() * 1000);
  }

  function beginRecording(startTime) {
    recStartTime = startTime;
    recEvents    = [];
    recActive    = true;
    pendingTake  = null;

    // Close sheet so pads are fully accessible; trigger button shows state
    recSheet.classList.remove('open');
    recBackdrop.classList.remove('open');
    recTrigger.classList.add('recording');
    recTrigger.textContent = '◼ Stop';
    document.getElementById('pad-grid').classList.add('recording');

    // Metronome through the recording window
    const totalBeats = recBars * BEATS_PER_BAR;
    for (let i = 0; i <= totalBeats; i++) scheduleClick(startTime + i * beatDuration(), i % BEATS_PER_BAR === 0);

    const msDuration = recBars * BEATS_PER_BAR * beatDuration() * 1000;
    recTimer = setTimeout(stopRecording, msDuration + (startTime - ctx.currentTime) * 1000);
  }

  function stopRecording() {
    clearTimeout(recTimer);
    if (!recActive) return;
    recActive = false;
    recTrigger.classList.remove('recording');
    recTrigger.textContent = '⏺ Rec';
    document.getElementById('pad-grid').classList.remove('recording');
    countdownPill.className = '';

    if (!recEvents.length) {
      // Nothing recorded — reopen sheet at setup state with a hint
      openRecSheet();
      const hint = document.createElement('p');
      hint.style.cssText = 'font-size:0.68rem;color:var(--amber);margin-top:8px;text-align:center;';
      hint.textContent = 'No hits recorded — tap the pads while the ● REC indicator is showing.';
      const existing = recSetup.querySelector('.rec-hint');
      if (existing) existing.remove();
      hint.className = 'rec-hint';
      recSetup.appendChild(hint);
      setTimeout(() => hint.remove(), 4000);
      return;
    }

    let events = recEvents.map(ev => {
      let beat = ev.beat;
      if (recQuantize) beat = Math.round(beat * STEPS_PER_BEAT) / STEPS_PER_BEAT;
      beat = Math.max(0, Math.min(beat, recBars * BEATS_PER_BAR - 0.001));
      return { id: ev.id, beat };
    });
    const seen = new Set();
    events = events.filter(ev => {
      const k = ev.id + ':' + ev.beat;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });

    pendingTake = { version: 1, bpm, bars: recBars, kit: currentKit, quantized: recQuantize, events };

    // Reopen sheet to save state
    recSheet.classList.add('open');
    recBackdrop.classList.add('open');
    showSaveState();
  }

  /* ── LOAD TAKE INTO SEQUENCER ─────────────────────────────── */
  function applyTake(take) {
    if (playing) stopTransport();
    TRACKS.forEach(t => { state[t.id].steps.forEach(c => { c.on = false; c.prob = 100; }); state[t.id].trackLen = 0; state[t.id].trackPos = 0; });
    const targetSteps = take.bars * BEATS_PER_BAR * STEPS_PER_BEAT;
    if (targetSteps !== STEPS) {
      STEPS = targetSteps;
      document.getElementById('steps-btn').textContent = STEPS;
    }
    take.events.forEach(ev => {
      const step = Math.round(ev.beat * STEPS_PER_BEAT) % STEPS;
      if (state[ev.id]) state[ev.id].steps[step].on = true;
    });
    if (take.kit && KITS[take.kit]) {
      currentKit = take.kit;
      syncKitUI();
    }
    buildGrid(); rebuildBeatRow();
    setMode(localStorage.getItem('beatlab:drums:mode') || 'seq');
  }

    mode = m;

    if (viewTxt) viewTxt.textContent = label;

    document.getElementById('timing-drop').style.display = isSeq ? '' : 'none';

    document.getElementById('kit-drop').style.display = '';

  /* ── TIME SIG ─────────────────────────────────────────────── */
  function applyTimeSig(beats) {
    beats = Math.max(1, Math.min(32, beats));
    if (!isFinite(beats) || beats === BEATS_PER_BAR) return;
    const wasPlaying = playing;
    if (wasPlaying) stopTransport();
    BEATS_PER_BAR = beats;
    STEPS = BEATS_PER_BAR * STEPS_PER_BEAT;
    document.getElementById('timesig-input').value = beats;
    document.getElementById('steps-btn').textContent = STEPS;
    currentStep = 0; buildGrid(); rebuildBeatRow();

  /* ── PATTERNS ─────────────────────────────────────────────── */
  function captureState() {
    const out = { bpm, steps: STEPS, beatsPerBar: BEATS_PER_BAR, kit: currentKit, tracks: {} };
    TRACKS.forEach(t => {
      const ts = state[t.id];
      out.tracks[t.id] = {
        steps: ts.steps.map(c => ({ on: c.on, prob: c.prob })),
        muted: ts.muted,
        trackLen: ts.trackLen,
      };
    });
    return out;
  }

  function applyState(saved) {
    if (playing) stopTransport();
    if (saved.bpm) setBpm(saved.bpm);
    if (saved.beatsPerBar) applyTimeSig(saved.beatsPerBar);
    if (saved.steps && saved.steps !== STEPS) {
      STEPS = saved.steps;
      document.getElementById('steps-btn').textContent = STEPS;
    }
    if (saved.kit && KITS[saved.kit]) {
      currentKit = saved.kit;
      syncKitUI();
    }
    TRACKS.forEach(t => {
      if (saved.tracks?.[t.id]) {
        const pd = saved.tracks[t.id];
        // Support old boolean format and new object format
        state[t.id].steps = Array(32).fill(null).map((_, i) => {
          const raw = pd.steps[i];
          if (!raw) return { on: false, prob: 100 };
          if (typeof raw === 'boolean') return { on: raw, prob: 100 };
          return { on: raw.on || false, prob: raw.prob || 100 };
        });
        state[t.id].muted   = pd.muted || false;
        state[t.id].trackLen = pd.trackLen || 0;
        state[t.id].trackPos = 0;
      }
    });
    allMuted = false;
    muteAllBtn.textContent = 'Mute All';
    muteAllBtn.style.color = muteAllBtn.style.borderColor = muteAllBtn.style.background = '';
    buildGrid(); rebuildBeatRow();
    dirty = false;
  }

  /* ── SHARE ────────────────────────────────────────────────── */
  // ── SHARE ENCODING ────────────────────────────────────────────
  // See docs/share-encoding.md for the full specification.
  //
  // IMPORTANT: If you change the bit layout, you MUST bump SHARE_VERSION
  // and add a new decodeVN() function. Never modify an existing decoder —
  // old shared links must always decode correctly.
  //
  // Current layout (v1) — ~150 base64url chars:
  //   [version: 4][bpm-60: 7][beatsPerBar-1: 5][kitIdx: 2][rsvd: 2][steps-1: 7][rsvd: 5]
  //   Per track × 12:
  //     [muted: 1][trackLen: 6][step×32: 2 each] — 00=off 01=100% 10=75% 11=≤50%
  const SHARE_VERSION = 1;
  const KIT_NAMES = Object.keys(KITS); // fixed order: 808, Acoustic, Lo-Fi, Electronic

  function encodeState() {
    try {
      const s = captureState();
      const bits = [];
      const push = (val, n) => { for (let i = n-1; i >= 0; i--) bits.push((val >> i) & 1); };

      push(SHARE_VERSION, 4);
      push(Math.min(127, Math.max(0, s.bpm - 60)), 7);
      push(Math.min(31,  Math.max(0, (s.beatsPerBar || 4) - 1)), 5);
      push(Math.max(0,   KIT_NAMES.indexOf(s.kit)), 2);
      push(0, 2); // reserved
      push(Math.min(127, Math.max(0, s.steps - 1)), 7);
      push(0, 5); // reserved — header total = 4+7+5+2+2+7+5 = 32 bits

      TRACKS.forEach(t => {
        const ts = s.tracks[t.id] || {};
        push(ts.muted ? 1 : 0, 1);
        push(Math.min(32, Math.max(0, ts.trackLen || 0)), 6);
        for (let i = 0; i < 32; i++) {
          const c = (ts.steps || [])[i] || { on: false, prob: 100 };
          if (!c.on)          push(0, 2);
          else if (c.prob >= 100) push(1, 2);
          else if (c.prob >= 75)  push(2, 2);
          else                    push(3, 2);
        }
      });

      const bytes = [];
      for (let i = 0; i < bits.length; i += 8) {
        let byte = 0;
        for (let j = 0; j < 8; j++) byte = (byte << 1) | (bits[i+j] || 0);
        bytes.push(byte);
      }
      return btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    } catch { return null; }
  }

  function decodeV1(read) {
    // version already consumed by caller
    const bpm        = read(7) + 60;
    const beatsPerBar = read(5) + 1;
    const kit        = KIT_NAMES[read(2)] || KIT_NAMES[0];
    read(2); // reserved
    const steps      = read(7) + 1;
    read(5); // reserved

    const tracks = {};
    TRACKS.forEach(t => {
      const muted   = !!read(1);
      const trackLen = read(6);
      const stepArr = [];
      for (let i = 0; i < 32; i++) {
        const v = read(2);
        if      (v === 0) stepArr.push({ on: false, prob: 100 });
        else if (v === 1) stepArr.push({ on: true,  prob: 100 });
        else if (v === 2) stepArr.push({ on: true,  prob: 75  });
        else              stepArr.push({ on: true,  prob: 50  });
      }
      tracks[t.id] = { muted, trackLen, steps: stepArr };
    });
    return { bpm, beatsPerBar, kit, steps, tracks };
  }

  function decodeState(hash) {
    try {
      const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(b64);
      // Legacy: pre-versioning JSON blob
      if (raw[0] === '{') return JSON.parse(decodeURIComponent(escape(raw)));

      const bytes = Array.from(raw, c => c.charCodeAt(0));
      const bits = [];
      bytes.forEach(b => { for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1); });
      let pos = 0;
      const read = n => { let v = 0; for (let i = 0; i < n; i++) v = (v << 1) | (bits[pos++] || 0); return v; };

      const version = read(4);
      if (version === 1) return decodeV1(read);
      // Future: if (version === 2) return decodeV2(read);
      return null; // unknown version
    } catch { return null; }
  }

  document.getElementById('share-btn').addEventListener('click', () => {
    const encoded = encodeState();
    if (!encoded) return;
    const url = location.href.split('#')[0] + '#' + encoded;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('share-btn');
      btn.textContent = 'Copied!';
      btn.style.color = 'var(--teal)';
      setTimeout(() => { btn.textContent = 'Share'; btn.style.color = ''; }, 2000);
    });
  });

  /* ── INIT ─────────────────────────────────────────────────── */
  buildGrid(); rebuildBeatRow(); buildKitSelector(); buildPads(); initSeqDrag();

  // Restore from shared URL if present
  if (location.hash.length > 1) {
    const saved = decodeState(location.hash.slice(1));
    if (saved) applyState(saved);
  }

  // Restore last kit and view mode
  const savedKit = localStorage.getItem('beatlab:drums:kit');
  if (savedKit && KITS[savedKit]) { currentKit = savedKit; syncKitUI(); }
  setMode(localStorage.getItem('beatlab:drums:mode') || 'seq');

})();
</script>

<style>
  #rotate-prompt {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    font-size: 0.85rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  body.is-touch.is-portrait:not(.pads-mode) #rotate-prompt { display: flex; }
  #rotate-prompt svg { opacity: 0.4; }

  #pads-landscape-hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: rgba(14,19,24,0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(245,166,35,0.3); border-radius: 999px;
    padding: 8px 16px 8px 14px;
    display: none; align-items: center; gap: 10px;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber);
    white-space: nowrap;
    animation: hint-in 200ms ease;
  }
  @keyframes hint-in { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  #pads-landscape-hint.visible { display: flex; }
  #pads-hint-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 0 2px; line-height: 1; transition: color 120ms; }
  #pads-hint-dismiss:hover { color: var(--amber); }
</style>

<div id="rotate-prompt">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
  </svg>
  Rotate to landscape
</div>

<div id="pads-landscape-hint">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.7;flex-shrink:0">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
  </svg>
  Portrait works better for pads
  <button id="pads-hint-dismiss">✕</button>
</div>

<script>
(function() {
  var isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
  if (!isTouch) return;
  document.body.classList.add('is-touch');
  var hint = document.getElementById('pads-landscape-hint');
  var hintDismissed = false;
  function checkOrientation() {
    var isPortrait = window.innerHeight > window.innerWidth;
    document.body.classList.toggle('is-portrait', isPortrait);
    var inPadsMode = document.body.classList.contains('pads-mode');
    if (inPadsMode && !isPortrait && !hintDismissed) { hint.classList.add('visible'); }
    else { hint.classList.remove('visible'); }
    if (isPortrait) hintDismissed = false;
  }
  document.getElementById('pads-hint-dismiss').addEventListener('click', function(e) {
    e.stopPropagation(); hintDismissed = true; hint.classList.remove('visible');
  });
  var modeObs = new MutationObserver(checkOrientation);
  modeObs.observe(document.body, { attributeFilter: ['class'] });
  checkOrientation();
  window.addEventListener('resize', checkOrientation);
})();
</script>
