<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drums — BeatLab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c10;
    --surface:   #0e1318;
    --surface-2: #121920;
    --divider:   #1a2830;
    --text:      #d4e8e0;
    --muted:     #6a8f80;
    --faint:     #2e4a40;
    --teal:      #00e5cc;
    --green:     #39ff6a;
    --amber:     #f5a623;
    --purple:    #b06fff;
    --pink:      #ff6b9d;
    --topbar-h:  52px;
    --label-w:   80px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }

  /* ── TOP BAR ──────────────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    background: rgba(8,12,16,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    z-index: 100; overflow-x: auto; overflow-y: hidden;
  }
  .topbar-btn {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--teal); background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.2); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 120ms, border-color 120ms;
  }
  .topbar-btn:hover   { background: rgba(0,229,204,0.16); }
  .topbar-btn.playing { background: rgba(0,229,204,0.18); border-color: var(--teal); }
  .logo { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--teal); flex-shrink: 0; }
  .divider-v { width: 1px; height: 24px; background: var(--divider); flex-shrink: 0; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ctrl-label { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .ctrl-value {
    font-size: 0.7rem; color: var(--teal); width: 3.6ch; text-align: center;
    font-variant-numeric: tabular-nums; background: none; border: none;
    border-bottom: 1px solid var(--divider); padding: 0; font-family: inherit;
    -moz-appearance: textfield;
  }
  .ctrl-value:focus { outline: none; border-bottom-color: var(--teal); }
  .ctrl-value::-webkit-inner-spin-button,
  .ctrl-value::-webkit-outer-spin-button { -webkit-appearance: none; }
  #bpm-slider, #vol-slider { width: 72px; }
  #right-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ── MODE TABS ────────────────────────────────────────────── */
  .mode-tab {
    font-family: inherit; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
    padding: 6px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: color 120ms, border-color 120ms;
  }
  .mode-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .mode-tab:hover:not(.active) { color: var(--text); }

  /* ── PATTERNS POPOVER ────────────────────────────────────── */
  .patterns-group { position: relative; }
  #patterns-popover {
    display: none; position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 200px; background: var(--surface); border: 1px solid var(--divider);
    border-radius: 8px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  #patterns-popover.open { display: flex; flex-direction: column; }
  #patterns-list { max-height: 200px; overflow-y: auto; }
  .pattern-row { display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; transition: background 100ms; }
  .pattern-row:hover { background: rgba(0,229,204,0.08); }
  .pattern-row-name { flex: 1; font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pattern-row-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.72rem; padding: 2px 4px; transition: color 120ms; }
  .pattern-row-del:hover { color: var(--pink); }
  #patterns-list-empty { padding: 12px 10px; font-size: 0.68rem; color: var(--muted); }
  #patterns-save-row { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--divider); }
  #patterns-name-input {
    flex: 1; background: var(--surface-2); border: 1px solid var(--divider); border-radius: 4px;
    color: var(--text); font-size: 0.72rem; padding: 4px 8px; font-family: inherit; outline: none;
  }
  #patterns-name-input:focus { border-color: var(--teal); }
  #patterns-save-btn {
    background: rgba(0,229,204,0.12); border: 1px solid rgba(0,229,204,0.3);
    border-radius: 4px; color: var(--teal); cursor: pointer; font-size: 0.68rem;
    letter-spacing: 0.06em; padding: 4px 10px; font-family: inherit; transition: background 120ms;
  }
  #patterns-save-btn:hover { background: rgba(0,229,204,0.22); }

  /* ── SEQUENCER VIEW ───────────────────────────────────────── */
  #seq-view {
    position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    overflow-y: auto; padding: 16px 12px 60px;
    display: flex; flex-direction: column; gap: 2px;
  }
  #seq-view.hidden { display: none; }

  /* ── BEAT HEADER ─────────────────────────────────────────── */
  #beat-header { display: flex; align-items: center; margin-bottom: 4px; padding: 0 2px; }
  #beat-header .label-spacer { width: var(--label-w); flex-shrink: 0; }
  .beat-num { text-align: center; font-size: 0.5rem; letter-spacing: 0.06em; color: var(--faint); font-variant-numeric: tabular-nums; }
  .beat-num.quarter { color: var(--muted); font-weight: 600; }

  /* ── TRACK ROW ────────────────────────────────────────────── */
  .track { display: flex; align-items: center; }
  .track-label { width: var(--label-w); flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
  .track-name { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-mute { background: none; border: none; cursor: pointer; color: var(--faint); padding: 3px; transition: color 120ms; flex-shrink: 0; }
  .track-mute:hover { color: var(--teal); }
  .track-mute.muted { color: var(--pink); opacity: 0.7; }
  .steps-row { display: grid; flex: 1; gap: 2px; touch-action: none; }
  .step { height: 34px; border-radius: 4px; cursor: pointer; border: 1px solid var(--divider); background: var(--surface-2); transition: background 80ms, border-color 80ms; }
  .step:hover { border-color: color-mix(in srgb, var(--accent, var(--teal)) 50%, transparent); }
  .step.on { background: var(--accent, var(--teal)); border-color: var(--accent, var(--teal)); box-shadow: 0 0 8px color-mix(in srgb, var(--accent, var(--teal)) 50%, transparent); }
  .step.current { border-color: #fff; }
  .step.on.current { background: #fff; border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.5); }
  .step-gap { width: 4px; height: 34px; }
  @media (pointer: coarse) { .step { height: 40px; border-radius: 6px; background: #1a2830; } }
  .section-label { font-size: 0.52rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); padding: 8px 0 2px var(--label-w); }

  /* ── BEAT ROW ─────────────────────────────────────────────── */
  #beat-row {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; align-items: center; pointer-events: none;
  }
  #beat-row.hidden { display: none; }
  .beat-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--divider); transition: background 60ms; }
  .beat-dot.quarter { width: 7px; height: 7px; }
  .beat-dot.active { background: var(--teal); box-shadow: 0 0 6px var(--teal); }

  /* ── PADS VIEW ────────────────────────────────────────────── */
  #pads-view {
    display: none; position: fixed; top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    flex-direction: column; align-items: center; gap: 12px; padding: 14px 12px 12px;
  }
  #pads-view.active { display: flex; }

  /* Kit selector */
  #kit-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex-shrink: 0; }
  .kit-btn {
    font-family: inherit; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: none; border: 1px solid var(--divider); border-radius: 6px;
    padding: 5px 14px; cursor: pointer; transition: all 120ms;
  }
  .kit-btn:hover { color: var(--text); border-color: var(--muted); }
  .kit-btn.active { color: var(--teal); border-color: var(--teal); background: rgba(0,229,204,0.1); }

  /* Pad grid */
  #pad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    width: 100%; max-width: 560px;
    flex: 1;
  }

  .pad {
    border-radius: 14px;
    border: 2px solid var(--divider);
    background: var(--surface);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    gap: 5px;
    transition: transform 80ms, background 80ms, border-color 80ms, box-shadow 80ms;
    position: relative; overflow: hidden;
  }
  .pad::after {
    content: ''; position: absolute; inset: 0;
    background: var(--pad-color, var(--teal));
    opacity: 0; border-radius: inherit;
    transition: opacity 300ms;
  }
  .pad.hit::after { opacity: 0.22; transition: opacity 0ms; }
  .pad.hit {
    transform: scale(0.93);
    border-color: var(--pad-color, var(--teal));
    box-shadow: 0 0 22px color-mix(in srgb, var(--pad-color, var(--teal)) 45%, transparent);
    transition: transform 80ms, border-color 0ms, box-shadow 0ms;
  }
  .pad-name {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--pad-color, var(--teal)); position: relative; z-index: 1;
  }
  .pad-sub {
    font-size: 0.52rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); position: relative; z-index: 1;
  }

  /* ── AUDIO BANNER ─────────────────────────────────────────── */
  #audio-banner {
    position: fixed; top: calc(var(--topbar-h) + 12px); left: 50%; transform: translateX(-50%);
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--teal); background: rgba(14,19,24,0.9);
    border: 1px solid rgba(0,229,204,0.2); border-radius: 999px;
    padding: 8px 18px; backdrop-filter: blur(12px); z-index: 20; transition: opacity 300ms;
  }
  #audio-banner.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<header id="topbar">
  <a href="../index.html" class="topbar-btn" style="text-decoration:none;font-size:11px;letter-spacing:.08em;">⌂ BeatLab</a>
  <div class="divider-v"></div>
  <div class="logo">Drums</div>
  <div class="divider-v"></div>

  <button class="mode-tab active" id="mode-seq-btn">Sequencer</button>
  <button class="mode-tab" id="mode-pads-btn">Pads</button>

  <!-- Sequencer-only controls -->
  <div id="seq-controls" style="display:contents;">
    <div class="divider-v"></div>
    <button class="topbar-btn" id="play-btn">▶ Play</button>
    <div class="divider-v"></div>
    <button class="topbar-btn" id="steps-btn">16 steps</button>
    <div class="divider-v"></div>
    <button class="topbar-btn" id="clear-btn">Clear</button>
    <div class="divider-v"></div>
    <button class="topbar-btn" id="mute-all-btn">Mute All</button>
    <div class="divider-v"></div>
    <div class="patterns-group">
      <button class="topbar-btn" id="patterns-btn">Patterns ▾</button>
      <div id="patterns-popover">
        <div id="patterns-list"></div>
        <div id="patterns-save-row">
          <input id="patterns-name-input" type="text" placeholder="pattern name" spellcheck="false">
          <button id="patterns-save-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="right-controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Vol</span>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.85">
    </div>
    <div class="ctrl-group" id="bpm-group">
      <span class="ctrl-label">BPM</span>
      <input type="range" id="bpm-slider" min="60" max="200" value="120">
      <input type="number" class="ctrl-value" id="bpm-value" min="60" max="200" value="120">
    </div>
  </div>
</header>

<!-- Sequencer view -->
<div id="seq-view"></div>

<!-- Pads view -->
<div id="pads-view">
  <div id="kit-selector"></div>
  <div id="pad-grid"></div>
</div>

<div id="beat-row"></div>
<div id="audio-banner">tap anywhere to enable audio</div>

<script type="module">
import { makeImpulse, makePinkNoise, makeWhiteNoise } from '../core/audio.js';
import { savePattern, loadPattern, listPatterns, deletePattern } from '../core/storage.js';

(() => {
  'use strict';

  const APP_ID    = 'drums';
  const LOOKAHEAD = 0.1;
  const TICK_MS   = 25;

  let STEPS = 16;
  let bpm   = 120;
  let mode  = 'seq'; // 'seq' | 'pads'
  function stepDuration() { return 60 / bpm / 4; }

  /* ── TRACK DEFINITIONS ────────────────────────────────────── */
  const TRACKS = [
    { id:'kick',    name:'Kick',     sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'snare',   name:'Snare',    sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'clap',    name:'Clap',     sub:'drum',   section:'Drums', color:'var(--teal)'   },
    { id:'hihat',   name:'Hi-Hat',   sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'openhat', name:'Open Hat', sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'crash',   name:'Crash',    sub:'cymbal', section:'Drums', color:'var(--green)'  },
    { id:'tomhi',   name:'Tom Hi',   sub:'tom',    section:'Drums', color:'var(--amber)'  },
    { id:'tomlo',   name:'Tom Lo',   sub:'tom',    section:'Drums', color:'var(--amber)'  },
    { id:'rim',     name:'Rim',      sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'shaker',  name:'Shaker',   sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'cowbell', name:'Cowbell',  sub:'perc',   section:'Perc',  color:'var(--purple)' },
    { id:'clave',   name:'Clave',    sub:'perc',   section:'Perc',  color:'var(--pink)'   },
  ];

  const state = {};
  TRACKS.forEach(t => { state[t.id] = { steps: Array(32).fill(false), muted: false }; });

  /* ── KIT DEFINITIONS ──────────────────────────────────────── */
  // Each kit maps instrument id → synthesis parameters.
  // Voice functions read from KITS[currentKit][id].
  const KITS = {
    '808': {
      kick:    { startFreq:150, endFreq:40,  decay:0.45, gain:1.8  },
      snare:   { bodyFreq:220,  bodyDecay:0.12, noiseHp:2000, noiseDecay:0.18, noiseGain:1.2 },
      clap:    { hp:1600, decay:0.07, gain:0.9  },
      hihat:   { hp:7000, decay:0.06, gain:1.4  },
      openhat: { hp:7000, decay:0.35, gain:1.2  },
      crash:   { hp:3000, bp:8000,  decay:1.4,  gain:1.0  },
      tomhi:   { startFreq:200, endFreq:80,  decay:0.30, gain:1.3  },
      tomlo:   { startFreq:100, endFreq:45,  decay:0.45, gain:1.5  },
      rim:     { freq:400,  decay:0.04, gain:0.6  },
      shaker:  { hp:8000,  decay:0.05, gain:0.6  },
      cowbell: { freq1:540, freq2:840, decay:0.40, gain:0.8  },
      clave:   { freq:2400, decay:0.025,gain:1.0  },
    },
    'acoustic': {
      kick:    { startFreq:100, endFreq:50,  decay:0.55, gain:1.6  },
      snare:   { bodyFreq:180,  bodyDecay:0.15, noiseHp:1500, noiseDecay:0.24, noiseGain:1.0 },
      clap:    { hp:1200, decay:0.10, gain:0.8  },
      hihat:   { hp:8000, decay:0.04, gain:1.2  },
      openhat: { hp:6000, decay:0.50, gain:1.0  },
      crash:   { hp:2500, bp:6000,  decay:2.0,  gain:0.9  },
      tomhi:   { startFreq:250, endFreq:100, decay:0.25, gain:1.2  },
      tomlo:   { startFreq:130, endFreq:55,  decay:0.40, gain:1.4  },
      rim:     { freq:600,  decay:0.03, gain:0.7  },
      shaker:  { hp:7000,  decay:0.08, gain:0.5  },
      cowbell: { freq1:560, freq2:880, decay:0.30, gain:0.7  },
      clave:   { freq:2800, decay:0.02, gain:0.9  },
    },
    'lo-fi': {
      kick:    { startFreq:120, endFreq:35,  decay:0.60, gain:2.0  },
      snare:   { bodyFreq:200,  bodyDecay:0.10, noiseHp:1800, noiseDecay:0.28, noiseGain:1.4 },
      clap:    { hp:1400, decay:0.09, gain:1.0  },
      hihat:   { hp:6000, decay:0.08, gain:1.0  },
      openhat: { hp:5500, decay:0.40, gain:0.9  },
      crash:   { hp:2000, bp:5000,  decay:1.8,  gain:0.8  },
      tomhi:   { startFreq:180, endFreq:70,  decay:0.35, gain:1.2  },
      tomlo:   { startFreq:90,  endFreq:40,  decay:0.50, gain:1.6  },
      rim:     { freq:350,  decay:0.05, gain:0.7  },
      shaker:  { hp:7500,  decay:0.07, gain:0.7  },
      cowbell: { freq1:500, freq2:780, decay:0.50, gain:0.9  },
      clave:   { freq:2200, decay:0.03, gain:1.1  },
    },
    'electronic': {
      kick:    { startFreq:200, endFreq:30,  decay:0.30, gain:2.2  },
      snare:   { bodyFreq:300,  bodyDecay:0.08, noiseHp:3000, noiseDecay:0.12, noiseGain:1.5 },
      clap:    { hp:2000, decay:0.05, gain:1.2  },
      hihat:   { hp:9000, decay:0.03, gain:1.6  },
      openhat: { hp:8000, decay:0.25, gain:1.4  },
      crash:   { hp:4000, bp:10000, decay:1.0,  gain:1.2  },
      tomhi:   { startFreq:300, endFreq:100, decay:0.20, gain:1.5  },
      tomlo:   { startFreq:150, endFreq:40,  decay:0.35, gain:1.8  },
      rim:     { freq:500,  decay:0.03, gain:0.8  },
      shaker:  { hp:9000,  decay:0.04, gain:0.8  },
      cowbell: { freq1:580, freq2:920, decay:0.25, gain:1.0  },
      clave:   { freq:3000, decay:0.02, gain:1.2  },
    },
  };

  let currentKit = '808';

  /* ── AUDIO ENGINE ─────────────────────────────────────────── */
  let ctx, masterGain, compressor, reverbConvolver, reverbReturn;
  let pinkBuf, whiteBuf;

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('vol-slider').value);
    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18; compressor.ratio.value = 4;
    masterGain.connect(compressor);
    compressor.connect(ctx.destination);
    reverbConvolver = ctx.createConvolver();
    reverbConvolver.buffer = makeImpulse(ctx, 2.2, 2.5);
    reverbReturn = ctx.createGain(); reverbReturn.gain.value = 0.75;
    reverbConvolver.connect(reverbReturn); reverbReturn.connect(masterGain);
    pinkBuf  = makePinkNoise(ctx, 2);
    whiteBuf = makeWhiteNoise(ctx, 2);
  }

  function reverbSend(g, amt) {
    const s = ctx.createGain(); s.gain.value = amt ?? 0.15;
    g.connect(s); s.connect(reverbConvolver);
  }

  /* ── PARAMETERISED VOICES ─────────────────────────────────── */
  function voiceKick(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.startFreq, time);
    osc.frequency.exponentialRampToValueAtTime(p.endFreq, time + 0.08);
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.05);
  }

  function voiceSnare(time, p) {
    const body = ctx.createOscillator(), bg = ctx.createGain();
    body.type = 'triangle';
    body.frequency.setValueAtTime(p.bodyFreq, time);
    body.frequency.exponentialRampToValueAtTime(p.bodyFreq * 0.45, time + 0.06);
    bg.gain.setValueAtTime(1.0, time);
    bg.gain.exponentialRampToValueAtTime(0.001, time + p.bodyDecay);
    body.connect(bg); bg.connect(masterGain);
    body.start(time); body.stop(time + p.bodyDecay + 0.03);
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), ng = ctx.createGain();
    ns.buffer = pinkBuf; hp.type = 'highpass'; hp.frequency.value = p.noiseHp;
    ng.gain.setValueAtTime(p.noiseGain, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + p.noiseDecay);
    ns.connect(hp); hp.connect(ng); ng.connect(masterGain); reverbSend(ng, 0.12);
    ns.start(time); ns.stop(time + p.noiseDecay + 0.02);
  }

  function voiceClap(time, p) {
    [0, 0.008, 0.018].forEach(offset => {
      const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
      ns.buffer = pinkBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
      g.gain.setValueAtTime(p.gain, time + offset);
      g.gain.exponentialRampToValueAtTime(0.001, time + offset + p.decay);
      ns.connect(hp); hp.connect(g); g.connect(masterGain); reverbSend(g, 0.18);
      ns.start(time + offset); ns.stop(time + offset + p.decay + 0.02);
    });
  }

  function voiceHihat(time, p) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain);
    ns.start(time); ns.stop(time + p.decay + 0.02);
  }

  function voiceOpenhat(time, p) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain); reverbSend(g, 0.1);
    ns.start(time); ns.stop(time + p.decay + 0.03);
  }

  function voiceCrash(time, p) {
    const ns = ctx.createBufferSource();
    ns.buffer = whiteBuf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = p.hp;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.bp; bp.Q.value = 0.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(masterGain); reverbSend(g, 0.25);
    ns.start(time); ns.stop(time + p.decay + 0.1);
  }

  function voiceTom(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.startFreq, time);
    osc.frequency.exponentialRampToValueAtTime(p.endFreq, time + p.decay * 0.4);
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.05);
  }

  function voiceRim(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'square'; osc.frequency.value = p.freq;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.01);
  }

  function voiceShaker(time, p) {
    const ns = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
    ns.buffer = whiteBuf; hp.type = 'highpass'; hp.frequency.value = p.hp;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    ns.connect(hp); hp.connect(g); g.connect(masterGain);
    ns.start(time); ns.stop(time + p.decay + 0.01);
  }

  function voiceCowbell(time, p) {
    const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), g = ctx.createGain();
    osc1.type = 'square'; osc1.frequency.value = p.freq1;
    osc2.type = 'square'; osc2.frequency.value = p.freq2;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc1.connect(g); osc2.connect(g); g.connect(masterGain); reverbSend(g, 0.1);
    osc1.start(time); osc1.stop(time + p.decay + 0.05);
    osc2.start(time); osc2.stop(time + p.decay + 0.05);
  }

  function voiceClave(time, p) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = p.freq;
    g.gain.setValueAtTime(p.gain, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + p.decay);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + p.decay + 0.01);
  }

  function voice(id, time) {
    const p = KITS[currentKit][id];
    switch (id) {
      case 'kick':    voiceKick(time, p);    break;
      case 'snare':   voiceSnare(time, p);   break;
      case 'clap':    voiceClap(time, p);    break;
      case 'hihat':   voiceHihat(time, p);   break;
      case 'openhat': voiceOpenhat(time, p); break;
      case 'crash':   voiceCrash(time, p);   break;
      case 'tomhi':   voiceTom(time, p);     break;
      case 'tomlo':   voiceTom(time, p);     break;
      case 'rim':     voiceRim(time, p);     break;
      case 'shaker':  voiceShaker(time, p);  break;
      case 'cowbell': voiceCowbell(time, p); break;
      case 'clave':   voiceClave(time, p);   break;
    }
  }

  /* ── SCHEDULER ────────────────────────────────────────────── */
  let playing = false, currentStep = 0, nextBeatTime = 0, tickTimer = null;

  function scheduleStep(step, time) {
    TRACKS.forEach(t => {
      if (!state[t.id].steps[step] || state[t.id].muted) return;
      voice(t.id, time);
    });
    const msUntil = Math.max(0, (time - ctx.currentTime) * 1000);
    setTimeout(() => updatePlayhead(step), msUntil);
  }

  function tick() {
    while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
      scheduleStep(currentStep, nextBeatTime);
      nextBeatTime += stepDuration();
      currentStep = (currentStep + 1) % STEPS;
    }
  }

  function startTransport() {
    if (!ctx) initAudio();
    ctx.resume();
    playing = true; currentStep = 0; nextBeatTime = ctx.currentTime + 0.05;
    tickTimer = setInterval(tick, TICK_MS);
    document.getElementById('play-btn').textContent = '◼ Stop';
    document.getElementById('play-btn').classList.add('playing');
  }

  function stopTransport() {
    playing = false; clearInterval(tickTimer); clearPlayhead();
    document.getElementById('play-btn').textContent = '▶ Play';
    document.getElementById('play-btn').classList.remove('playing');
  }

  function toggleTransport() { playing ? stopTransport() : startTransport(); }

  /* ── PLAYHEAD ─────────────────────────────────────────────── */
  let lastStep = -1;

  function updatePlayhead(step) {
    if (lastStep >= 0) {
      document.querySelectorAll(`.step[data-step="${lastStep}"]`).forEach(el => el.classList.remove('current'));
      const prev = document.querySelectorAll('.beat-dot')[lastStep];
      if (prev) prev.classList.remove('active');
    }
    document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('current'));
    const dot = document.querySelectorAll('.beat-dot')[step];
    if (dot) dot.classList.add('active');
    lastStep = step;
  }

  function clearPlayhead() {
    document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
    document.querySelectorAll('.beat-dot.active').forEach(el => el.classList.remove('active'));
    lastStep = -1;
  }

  /* ── SEQUENCER GRID ───────────────────────────────────────── */
  const gridColsStyle = () => `repeat(${STEPS + Math.floor(STEPS / 4) - 1}, 1fr)`;

  function buildGrid() {
    const view = document.getElementById('seq-view');
    view.innerHTML = '';

    const header = document.createElement('div');
    header.id = 'beat-header';
    header.style.display = 'flex';
    header.style.alignItems = 'center';
    header.style.marginBottom = '4px';
    const spacer = document.createElement('div');
    spacer.className = 'label-spacer';
    header.appendChild(spacer);
    const nums = document.createElement('div');
    nums.style.cssText = `display:grid;flex:1;grid-template-columns:${gridColsStyle()};gap:2px;`;
    for (let i = 0; i < STEPS; i++) {
      if (i > 0 && i % 4 === 0) {
        const gap = document.createElement('div');
        gap.style.width = '4px';
        nums.appendChild(gap);
      }
      const n = document.createElement('div');
      n.className = 'beat-num' + (i % 4 === 0 ? ' quarter' : '');
      n.textContent = i % 4 === 0 ? String(Math.floor(i / 4) + 1) : '·';
      nums.appendChild(n);
    }
    header.appendChild(nums);
    view.appendChild(header);

    let lastSection = null;
    TRACKS.forEach(track => {
      if (track.section !== lastSection) {
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = track.section;
        view.appendChild(lbl);
        lastSection = track.section;
      }
      view.appendChild(buildTrackRow(track));
    });
  }

  function buildTrackRow(track) {
    const ts = state[track.id];
    const row = document.createElement('div');
    row.className = 'track'; row.dataset.trackId = track.id;

    const label = document.createElement('div');
    label.className = 'track-label';

    const nameEl = document.createElement('span');
    nameEl.className = 'track-name';
    nameEl.textContent = track.name;
    nameEl.style.color = track.color;

    const muteBtn = document.createElement('button');
    muteBtn.className = 'track-mute' + (ts.muted ? ' muted' : '');
    muteBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path class="mx" d="M23 9 17 15M17 9 23 15" style="${ts.muted?'':'display:none'}"/>
      <path class="vw" d="M15.54 8.46a5 5 0 0 1 0 7.07" style="${ts.muted?'display:none':''}"/>
    </svg>`;
    muteBtn.addEventListener('click', () => {
      ts.muted = !ts.muted;
      muteBtn.classList.toggle('muted', ts.muted);
      muteBtn.querySelector('.mx').style.display = ts.muted ? '' : 'none';
      muteBtn.querySelector('.vw').style.display = ts.muted ? 'none' : '';
    });

    label.appendChild(nameEl); label.appendChild(muteBtn);
    row.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'steps-row';
    grid.style.gridTemplateColumns = gridColsStyle();
    grid.style.setProperty('--accent', track.color);

    for (let s = 0; s < STEPS; s++) {
      if (s > 0 && s % 4 === 0) {
        const gap = document.createElement('div'); gap.className = 'step-gap'; grid.appendChild(gap);
      }
      const btn = document.createElement('div');
      btn.className = 'step' + (ts.steps[s] ? ' on' : '');
      btn.dataset.trackId = track.id; btn.dataset.step = s;
      grid.appendChild(btn);
    }

    let dragIntent = null;
    grid.addEventListener('pointerdown', e => {
      const btn = e.target.closest('.step');
      if (!btn || btn.dataset.trackId !== track.id) return;
      e.preventDefault();
      const s = parseInt(btn.dataset.step, 10);
      dragIntent = ts.steps[s] ? 'off' : 'on';
      applyStep(ts, btn, s, dragIntent);
    });
    grid.addEventListener('pointermove', e => {
      if (dragIntent === null) return;
      e.preventDefault();
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.step');
      if (!target || target.dataset.trackId !== track.id) return;
      applyStep(ts, target, parseInt(target.dataset.step, 10), dragIntent);
    }, { passive: false });
    grid.addEventListener('pointerup',     () => { dragIntent = null; });
    grid.addEventListener('pointercancel', () => { dragIntent = null; });

    row.appendChild(grid);
    return row;
  }

  function applyStep(ts, btn, step, intent) {
    const on = intent === 'on';
    if (ts.steps[step] === on) return;
    ts.steps[step] = on;
    btn.classList.toggle('on', on);
  }

  /* ── BEAT ROW ─────────────────────────────────────────────── */
  function rebuildBeatRow() {
    const beatRow = document.getElementById('beat-row');
    beatRow.innerHTML = '';
    for (let i = 0; i < STEPS; i++) {
      const dot = document.createElement('div');
      dot.className = 'beat-dot' + (i % 4 === 0 ? ' quarter' : '');
      beatRow.appendChild(dot);
    }
  }

  /* ── PADS VIEW ────────────────────────────────────────────── */
  function buildKitSelector() {
    const sel = document.getElementById('kit-selector');
    sel.innerHTML = '';
    Object.keys(KITS).forEach(kit => {
      const btn = document.createElement('button');
      btn.className = 'kit-btn' + (kit === currentKit ? ' active' : '');
      btn.textContent = kit;
      btn.addEventListener('click', () => {
        currentKit = kit;
        sel.querySelectorAll('.kit-btn').forEach(b => b.classList.toggle('active', b.textContent === kit));
      });
      sel.appendChild(btn);
    });
  }

  function buildPads() {
    const grid = document.getElementById('pad-grid');
    grid.innerHTML = '';
    TRACKS.forEach(track => {
      const pad = document.createElement('div');
      pad.className = 'pad';
      pad.dataset.trackId = track.id;
      pad.style.setProperty('--pad-color', track.color);

      const name = document.createElement('span');
      name.className = 'pad-name';
      name.textContent = track.name;

      const sub = document.createElement('span');
      sub.className = 'pad-sub';
      sub.textContent = track.sub;

      pad.appendChild(name);
      pad.appendChild(sub);

      // Pointer events — support multi-touch (each finger fires its own pad)
      pad.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (!ctx) initAudio();
        ctx.resume();
        voice(track.id, ctx.currentTime + 0.01);
        pad.classList.add('hit');
      });
      pad.addEventListener('pointerup',     () => { setTimeout(() => pad.classList.remove('hit'), 80); });
      pad.addEventListener('pointercancel', () => { pad.classList.remove('hit'); });
      pad.addEventListener('pointerleave',  () => { pad.classList.remove('hit'); });

      grid.appendChild(pad);
    });
  }

  /* ── MODE SWITCH ──────────────────────────────────────────── */
  function setMode(m) {
    mode = m;
    const isSeq = m === 'seq';

    document.getElementById('mode-seq-btn').classList.toggle('active', isSeq);
    document.getElementById('mode-pads-btn').classList.toggle('active', !isSeq);

    // Show/hide sequencer-only controls
    const seqCtls = document.getElementById('seq-controls');
    seqCtls.style.display = isSeq ? 'contents' : 'none';
    document.getElementById('bpm-group').style.display = isSeq ? '' : 'none';

    document.getElementById('seq-view').classList.toggle('hidden', !isSeq);
    document.getElementById('beat-row').classList.toggle('hidden', !isSeq);
    document.getElementById('pads-view').classList.toggle('active', !isSeq);

    // Suppress portrait-rotate prompt in pads mode (portrait is fine for pads)
    document.body.classList.toggle('pads-mode', !isSeq);

    if (!isSeq && playing) stopTransport();
  }

  document.getElementById('mode-seq-btn').addEventListener('click', () => setMode('seq'));
  document.getElementById('mode-pads-btn').addEventListener('click', () => setMode('pads'));

  /* ── STEPS TOGGLE ─────────────────────────────────────────── */
  document.getElementById('steps-btn').addEventListener('click', () => {
    const wasPlaying = playing;
    if (wasPlaying) stopTransport();
    STEPS = STEPS === 16 ? 32 : 16;
    document.getElementById('steps-btn').textContent = STEPS + ' steps';
    currentStep = 0;
    buildGrid(); rebuildBeatRow();
    if (wasPlaying) startTransport();
  });

  /* ── CLEAR ────────────────────────────────────────────────── */
  document.getElementById('clear-btn').addEventListener('click', () => {
    TRACKS.forEach(t => { state[t.id].steps.fill(false); });
    document.querySelectorAll('.step.on').forEach(el => el.classList.remove('on'));
  });

  const muteAllBtn = document.getElementById('mute-all-btn');
  let allMuted = false;
  muteAllBtn.addEventListener('click', () => {
    allMuted = !allMuted;
    TRACKS.forEach(t => { state[t.id].muted = allMuted; });
    document.querySelectorAll('.track-mute').forEach(btn => {
      btn.classList.toggle('muted', allMuted);
      btn.querySelector('.mx').style.display = allMuted ? '' : 'none';
      btn.querySelector('.vw').style.display = allMuted ? 'none' : '';
    });
    muteAllBtn.textContent = allMuted ? 'Unmute All' : 'Mute All';
    muteAllBtn.style.color = allMuted ? 'var(--pink)' : '';
    muteAllBtn.style.borderColor = allMuted ? 'rgba(255,107,157,0.4)' : '';
    muteAllBtn.style.background = allMuted ? 'rgba(255,107,157,0.08)' : '';
  });

  /* ── PATTERNS ─────────────────────────────────────────────── */
  function captureState() {
    const out = { bpm, steps: STEPS, kit: currentKit, tracks: {} };
    TRACKS.forEach(t => { out.tracks[t.id] = { steps: [...state[t.id].steps], muted: state[t.id].muted }; });
    return out;
  }

  function applyState(saved) {
    if (playing) stopTransport();
    if (saved.bpm) setBpm(saved.bpm);
    if (saved.steps && saved.steps !== STEPS) {
      STEPS = saved.steps;
      document.getElementById('steps-btn').textContent = STEPS + ' steps';
    }
    if (saved.kit && KITS[saved.kit]) {
      currentKit = saved.kit;
      document.querySelectorAll('.kit-btn').forEach(b => b.classList.toggle('active', b.textContent === currentKit));
    }
    TRACKS.forEach(t => {
      if (saved.tracks?.[t.id]) {
        const pd = saved.tracks[t.id];
        state[t.id].steps = pd.steps.slice(0, 32);
        while (state[t.id].steps.length < 32) state[t.id].steps.push(false);
        state[t.id].muted = pd.muted || false;
      }
    });
    allMuted = false;
    muteAllBtn.textContent = 'Mute All';
    muteAllBtn.style.color = muteAllBtn.style.borderColor = muteAllBtn.style.background = '';
    buildGrid(); rebuildBeatRow();
  }

  function renderPatternList() {
    const list = document.getElementById('patterns-list');
    list.innerHTML = '';
    const names = listPatterns(APP_ID);
    if (!names.length) {
      const em = document.createElement('div'); em.id = 'patterns-list-empty';
      em.textContent = 'No saved patterns yet.'; list.appendChild(em); return;
    }
    names.forEach(name => {
      const row = document.createElement('div'); row.className = 'pattern-row';
      const nameEl = document.createElement('span'); nameEl.className = 'pattern-row-name'; nameEl.textContent = name;
      nameEl.addEventListener('click', () => { applyState(loadPattern(APP_ID, name)); closePatterns(); });
      const del = document.createElement('button'); del.className = 'pattern-row-del'; del.textContent = '✕';
      del.addEventListener('click', e => { e.stopPropagation(); deletePattern(APP_ID, name); renderPatternList(); });
      row.appendChild(nameEl); row.appendChild(del); list.appendChild(row);
    });
  }

  function closePatterns() { document.getElementById('patterns-popover').classList.remove('open'); }

  document.getElementById('patterns-btn').addEventListener('click', e => {
    e.stopPropagation();
    const pop = document.getElementById('patterns-popover');
    if (!pop.classList.contains('open')) renderPatternList();
    pop.classList.toggle('open');
  });

  document.getElementById('patterns-save-btn').addEventListener('click', () => {
    const input = document.getElementById('patterns-name-input');
    const name = input.value.trim(); if (!name) { input.focus(); return; }
    savePattern(APP_ID, name, captureState()); input.value = ''; renderPatternList();
  });

  document.getElementById('patterns-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('patterns-save-btn').click();
    if (e.key === 'Escape') closePatterns();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.patterns-group')) closePatterns();
  });

  /* ── VOLUME & BPM ─────────────────────────────────────────── */
  document.getElementById('vol-slider').addEventListener('input', e => {
    if (masterGain) masterGain.gain.setTargetAtTime(parseFloat(e.target.value), ctx.currentTime, 0.02);
  });

  const bpmSlider = document.getElementById('bpm-slider');
  const bpmInput  = document.getElementById('bpm-value');

  function setBpm(v) {
    v = Math.max(60, Math.min(200, v));
    if (!isFinite(v)) return;
    bpm = v; bpmSlider.value = v; bpmInput.value = v;
  }

  bpmSlider.addEventListener('input',  e => setBpm(parseInt(e.target.value, 10)));
  bpmInput.addEventListener('change',  e => setBpm(parseInt(e.target.value, 10)));
  bpmInput.addEventListener('keydown', e => { if (e.key === 'Enter') bpmInput.blur(); });

  /* ── PLAY / KEYBOARD ──────────────────────────────────────── */
  document.getElementById('play-btn').addEventListener('click', toggleTransport);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') { e.preventDefault(); toggleTransport(); }
  });

  /* ── AUDIO UNLOCK ─────────────────────────────────────────── */
  const banner = document.getElementById('audio-banner');
  ['pointerdown','keydown'].forEach(evt =>
    document.addEventListener(evt, () => {
      if (!ctx) initAudio();
      ctx.resume().then(() => { if (ctx.state === 'running') banner.classList.add('hidden'); });
    }, { passive: true })
  );

  /* ── INIT ─────────────────────────────────────────────────── */
  buildGrid();
  rebuildBeatRow();
  buildKitSelector();
  buildPads();

})();
</script>

<style>
  #rotate-prompt {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    font-size: 0.85rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  /* Suppress rotate prompt in pads mode — portrait is fine */
  body.is-touch.is-portrait:not(.pads-mode) #rotate-prompt { display: flex; }
  #rotate-prompt svg { opacity: 0.4; }
</style>
<div id="rotate-prompt">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
  </svg>
  Rotate to landscape
</div>
<script>
(function() {
  var isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
  if (isTouch) {
    document.body.classList.add('is-touch');
    function checkOrientation() {
      document.body.classList.toggle('is-portrait', window.innerHeight > window.innerWidth);
    }
    checkOrientation();
    window.addEventListener('resize', checkOrientation);
  }
})();
</script>
</body>
